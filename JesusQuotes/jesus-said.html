+ "Тож якщо Сатана повстав проти себе і в ньому самому виникло поділення, то й він не встоїть, йому прийде кінець. "
+ "Також ніхто, ввійшовши в дім сильного чоловіка, не зможе вкрасти його майно, якщо спочатку не зв’яже того чоловіка. Лише тоді він зможе пограбувати дім. "
+ "Правду кажу вам: усе проститься синам людським, хоч би які гріхи вони чинили і які зневажливі слова говорили. " 
+ "Але якщо хтось говоритиме зневажливі слова проти святого духу, той ніколи не отримає прощення; на ньому тяжіє вічний гріх»." },
{ book: "Марка", chapter: 3, verse: "33-35", ref: "Марка: 3:33-35", text: "«Хто моя мати і мої брати? — і тоді, поглянувши на тих, хто сидів довкола, промовив: — Ось моя мати і мої брати! Кожен, хто виконує волю Бога, є мені братом, і сестрою, і матір’ю»." },

{ book: "Марка", chapter: 4, verse: "3-8", ref: "Марка: 4:3-8", text: "Послухайте. Якось сіяч вийшов сіяти. Коли він сіяв, трохи насіння впало при дорозі, але прилетіли птахи і повидзьобували його. "
+ "Ще трохи насіння впало на кам’янисту землю, де було мало ґрунту. Воно відразу проросло, бо ґрунт був неглибокий. "
+ "Та коли зійшло сонце, то спалило його, і воно засохло, оскільки не мало коріння. " 
+ "Ще трохи насіння впало між терни, але терни виросли й заглушили його, і воно не принесло жодного плоду. "
+ "А ще трохи насіння впало на добрий ґрунт і, піднявшись, виросло та почало давати плоди — у 30, 60 і 100 разів більше, ніж було посіяно»." },
{ book: "Марка", chapter: 4, verse: "9", ref: "Марка: 4:9", text: "«Хто має вуха, щоб слухати, нехай слухає»." },
{ book: "Марка", chapter: 4, verse: "11, 12", ref: "Марка: 4:11, 12", text: "«Вам дано зрозуміти священну таємницю Божого Царства, а для сторонніх усе почуте так і залишається прикладами. "
+ "А все це для того, щоб, дивлячись, вони не бачили і, слухаючи, не розуміли суті сказаного; вони ніколи не навернуться і не отримають прощення»." },

{ book: "Марка", chapter: 4, verse: "13-20", ref: "Марка: 4:13-20", text: "«Якщо ви не розумієте цього прикладу, то як зможете зрозуміти інші? "
+ "Сіяч сіє слово. Насіння, яке падає при дорозі,— це слово, посіяне в людях, до котрих — тільки-но вони почують слово — приходить Сатана і забирає посіяне. "
+ "Якщо насіння падає на кам’янисту землю, це означає, що люди, почувши слово, відразу приймають його з радістю, "
+ "але вони не мають кореня, хоча й тримаються якийсь час. І коли через слово вони зазнаю́ть лиха чи переслідувань, то падають. "
+ "Буває і так, що насіння потрапляє між терни. Це означає, що люди чують слово, але тривоги цього віку, багатство, яке вводить в оману, та прагнення всього іншого полонять серце і заглушують слово, тож воно не приносить жодного плоду. "
+ "Коли ж насіння падає на добрий ґрунт, це означає, що люди слухають слово, охоче його приймають і приносять плоди — у 30, 60 і 100 разів більше»." },
{ book: "Марка", chapter: 4, verse: "21-23", ref: "Марка: 4:21-23", text: "Хіба світильник виносять для того, щоб поставити під кошик чи під ліжко? Хіба ж не для того його виносять, щоб поставити на підставку? Адже все приховане з часом має бути розкрите. І, хоч би як старанно щось ховали, воно стане відомим. Хто має вуха, щоб слухати, нехай слухає»." },
{ book: "Марка", chapter: 4, verse: "24", ref: "Марка: 4:24", text: "«Звертайте увагу на те, що чуєте. Якою мірою міряєте, такою відміряють і вам, та ще й додадуть. Бо той, хто має, отримає ще більше. А в того, хто не має, заберуть навіть те, що він має»." },
{ book: "Марка", chapter: 4, verse: "26-29", ref: "Марка: 4:26-29", text: "«Боже Царство можна порівняти з тим, як чоловік кидає в землю насіння. Вночі він спить, вранці встає, а насіння тим часом сходить і виростає, хоча він не знає як. Земля сама поступово приносить плід: спочатку з’являється стеблина, потім колосок і аж в кінці на ньому визріває зерно. А як тільки врожай достигає, чоловік береться за серп, бо настали жнива»." },
{ book: "Марка", chapter: 4, verse: "30-32", ref: "Марка: 4:30-32", text: "«З чим можна порівняти Боже Царство або яким прикладом його описати? Воно подібне до гірчичного зернятка: коли воно сіється, то є найдрібнішим насінням на землі, а коли потрапляє в ґрунт і виростає, то стає найбільшою від усіх городніх рослин і пускає такі великі гілки, що навіть небесні птахи можуть оселитися в його тіні»." },
{ book: "Марка", chapter: 4, verse: "35", ref: "Марка: 4:35", text: "«Перепливімо на другий берег»." },
{ book: "Марка", chapter: 4, verse: "39", ref: "Марка: 4:39", text: "«Ущухни! Заспокойся!»." },
{ book: "Марка", chapter: 4, verse: "40", ref: "Марка: 4:40", text: "«Чому ви так налякалися? Невже у вас досі немає ані краплини віри?»." },
{ book: "Марка", chapter: 5, verse: "8", ref: "Марка: 5:8", text: "«Духу нечистий, вийди з цього чоловіка»." },
{ book: "Марка", chapter: 5, verse: "9", ref: "Марка: 5:9", text: "«Як тебе звати?»." },
{ book: "Марка", chapter: 5, verse: "19", ref: "Марка: 5:19", text: "«Іди додому, до родини, і розкажи про все, що зробив для тебе Єгова, і про те, як він змилосердився над тобою»." },
{ book: "Марка", chapter: 5, verse: "30", ref: "Марка: 5:30", text: "«Хто торкнувся до мого одягу?»." },
{ book: "Марка", chapter: 5, verse: "34", ref: "Марка: 5:34", text: "«Дочко, твоя віра зцілила тебе. Іди з миром і не страждай від цієї тяжкої хвороби»." },
{ book: "Марка", chapter: 5, verse: "37", ref: "Марка: 5:37", text: "«Не бійся, тільки вір»." },
{ book: "Марка", chapter: 5, verse: "39", ref: "Марка: 5:39", text: "«Чому ви плачете? Чому ви у сум’ятті? Дитина не померла, вона просто спить»." },
{ book: "Марка", chapter: 5, verse: "41", ref: "Марка: 5:41", text: "«Таліта́ ку́мі»." },
{ book: "Марка", chapter: 5, verse: "41", ref: "Марка: 5:41", text: "«Дівчинко, кажу тобі, встань!»." },
{ book: "Марка", chapter: 6, verse: "4", ref: "Марка: 6:4", text: "«Пророка шанують скрізь, тільки не в рідних краях, не в рідному домі і не серед родичів»." },
{ book: "Марка", chapter: 6, verse: "10-11", ref: "Марка: 6:10-11", text: "«До якого дому ввійдете, там і залишайтесь, аж поки не підете звідти. А якщо вас десь не приймуть і не будуть слухати, то, залишаючи те місце, обтрусіть порох зі своїх ніг. Це буде свідченням проти них»." },
{ book: "Марка", chapter: 6, verse: "31", ref: "Марка: 6:31", text: "«Ходіть зі мною у віддалене місце і трохи відпочиньте»." },
{ book: "Марка", chapter: 6, verse: "37", ref: "Марка: 6:37", text: "«Ви нагодуйте їх»." },
{ book: "Марка", chapter: 6, verse: "38", ref: "Марка: 6:38", text: "«Ідіть подивіться, скільки маєте хлібин»." },
{ book: "Марка", chapter: 6, verse: "50", ref: "Марка: 6:50", text: "«Не бійтеся, це я. Не лякайтесь»." },
{ book: "Марка", chapter: 7, verse: "6-8", ref: "Марка: 7:6-8", text: "«Ісая влучно пророкував про вас, лицеміри, як написано: “Ці люди шанують мене своїми устами, але їхні серця далеко від мене. Проте даремно вони поклоняються мені, бо видають людські заповіді за Божі вчення”. Ви відкидаєте заповіді Бога й міцно тримаєтесь традицій людей»." },
{ book: "Марка", chapter: 7, verse: "9-13", ref: "Марка: 7:9-13", text: "«Ви майстерно обходите Божі заповіді, аби тільки зберегти власні традиції. Наприклад, Мойсей сказав: “Шануй батька і матір”, а також: “Нехай той, хто зневажливо говорить про свого батька чи матір, буде покараний смертю”. Ви ж говорите: “Хто скаже батькові чи матері: «Все, що я маю і чим міг би допомогти тобі,— це корва́н (тобто дар, присвячений Богові)»...” Цим ви не даєте такій людині зробити щось для батька чи матері. Так ви своїми традиціями, які самі ж встановили, позбавляєте сили Боже слово. І ви робите ще багато подібного»." },
{ book: "Марка", chapter: 7, verse: "14-15", ref: "Марка: 7:14-15", text: "«Послухайте всі й зрозумійте: немає нічого такого, що, потрапляючи всередину людини, могло б її опоганити. Опоганює людину тільки те, що з неї виходить»." },
{ book: "Марка", chapter: 7, verse: "18, 19", ref: "Марка: 7:18, 19", text: "Невже ви, так само як і вони, не розумієте? Невже не знаєте: ніщо з того, що потрапляє всередину людини, не може її опоганити? Адже воно потрапляє не в серце, а в шлунок й після того виходить у стічний рів»." },
{ book: "Марка", chapter: 7, verse: "20-23", ref: "Марка: 7:20-23", text: "«Опоганює людину те, що з неї виходить. Бо зсередини, з людського серця, виходять погані думки, що породжують статеву розпусту, крадіжки, вбивства, перелюб, жадібність, лихі вчинки, обман, розгнузданість, заздрісне око, зневажливі слова, пихатість і непоміркованість. Усе це зло походить зсередини, і саме воно опоганює людину»." },
{ book: "Марка", chapter: 7, verse: "27", ref: "Марка: 7:27", text: "«Нехай спочатку наситяться діти, бо недобре забрати хліб у дітей і кинути цуценятам»." },
{ book: "Марка", chapter: 7, verse: "29", ref: "Марка: 7:29", text: "«За те, що ти так сказала, іди, демон вийшов з твоєї дочки»." },
{ book: "Марка", chapter: 7, verse: "34", ref: "Марка: 7:34", text: "«Еффа́та»." },
{ book: "Марка", chapter: 7, verse: "34", ref: "Марка: 7:34", text: "«Відкрийся»." },
{ book: "Марка", chapter: 8, verse: "2, 3", ref: "Марка: 8:2, 3", text: "«Шкода мені цих людей, бо вони вже три дні зі мною і не мають що їсти. Якщо відправлю їх додому голодними, то вони ослабнуть в дорозі, бо багато з них прийшли здалека»." },
{ book: "Марка", chapter: 8, verse: "5", ref: "Марка: 8:5", text: "«Скільки маєте хлібин?»." },
{ book: "Марка", chapter: 8, verse: "12", ref: "Марка: 8:12", text: "«Чому це покоління хоче побачити знак? Правду кажу вам: це покоління не отримає жодного знаку»." },
{ book: "Марка", chapter: 8, verse: "15", ref: "Марка: 8:15", text: "«Дивіться, остерігайтеся фарисейської та Іродової закваски»." },
{ book: "Марка", chapter: 8, verse: "17-19", ref: "Марка: 8:17-19", text: "«Чому ви сваритесь через те, що не маєте хліба? Невже ви й досі не збагнули того, що я мав на увазі? Невже ваші серця все ще не можуть цього зрозуміти? “Маючи очі, ви не бачите? Маючи вуха, не чуєте?” Хіба ви вже забули, скільки кошиків, повних хліба, ви зібрали після того, як я поламав і розділив п’ять хлібин на 5000 чоловіків?»." },
{ book: "Марка", chapter: 8, verse: "20", ref: "Марка: 8:20", text: "«А коли поламав і розділив сім хлібин на 4000, скільки потім зібрали повних кошиків?»." },
{ book: "Марка", chapter: 8, verse: "21", ref: "Марка: 8:21", text: "«Невже ви й досі нічого не розумієте?»." },
{ book: "Марка", chapter: 8, verse: "23", ref: "Марка: 8:23", text: "«Бачиш щось?»." },
{ book: "Марка", chapter: 8, verse: "26", ref: "Марка: 8:26", text: "«Тільки не заходь у село»." },
{ book: "Марка", chapter: 8, verse: "27", ref: "Марка: 8:27", text: "«Що люди говорять про мене? Хто я такий?»." },
{ book: "Марка", chapter: 8, verse: "29", ref: "Марка: 8:29", text: "«А ви, що ви думаєте? Хто я такий?»." },
{ book: "Марка", chapter: 8, verse: "33", ref: "Марка: 8:33", text: "«Відійди від мене, Сатано, бо ти думаєш не про Боже, а про людське»." },
{ book: "Марка", chapter: 8, verse: "34-38", ref: "Марка: 8:34-38", text: "«Якщо хтось хоче йти за мною, нехай зречеться самого себе, візьме свій стовп мук і постійно йде за мною. Бо, хто хоче врятувати своє життя, той його погубить. А хто погубить своє життя заради мене і доброї новини, той врятує його. Яка ж користь людині, коли вона здобуде цілий світ, але втратить життя? Справді, що дасть людина взамін за своє життя? Хто буде соромитись мене і моїх слів перед цим перелюбним і грішним поколінням, того посоромиться і Син людський, коли прийде зі святими ангелами у славі свого Батька»." },
{ book: "Марка", chapter: 9, verse: "1", ref: "Марка: 9:1", text: "«Правду кажу вам: декотрі з тих, хто тут стоїть, не скуштують смерті, аж поки не побачать, як Боже Царство запанує у своїй могутності»." },
{ book: "Марка", chapter: 9, verse: "12, 13", ref: "Марка: 9:12, 13", text: "«Спочатку справді повинен прийти Ілля і все відновити. Але чому тоді написано, що Син людський має знести багато страждань і його зневажатимуть? Кажу вам: Ілля вже прийшов, і з ним зробили все, що хотіли, як і написано про нього»." },
{ book: "Марка", chapter: 9, verse: "16", ref: "Марка: 9:16", text: "«Про що ви сперечаєтесь?»." },
{ book: "Марка", chapter: 9, verse: "19", ref: "Марка: 9:19", text: "«О безвірне покоління! Скільки мені ще бути з вами? Скільки ще терпіти вас? Приведіть його до мене»." },
{ book: "Марка", chapter: 9, verse: "21", ref: "Марка: 9:21", text: "«Скільки часу це в нього?»." },
{ book: "Марка", chapter: 9, verse: "23", ref: "Марка: 9:23", text: "«Кажеш: “Якщо можеш”? Для того, хто вірить, можливо все»." },
{ book: "Марка", chapter: 9, verse: "25", ref: "Марка: 9:25", text: "«Духу німоти й глухоти, наказую тобі: вийди з нього і більше ніколи не повертайся!»." },
{ book: "Марка", chapter: 9, verse: "29", ref: "Марка: 9:29", text: "«Такий рід не змусиш вийти нічим, крім молитви»." },
{ book: "Марка", chapter: 9, verse: "31", ref: "Марка: 9:31", text: "«Сина людського зрадять і видадуть в руки людей, і вони його вб’ють. Але хоча його вб’ють, через три дні він воскресне»." },
{ book: "Марка", chapter: 9, verse: "33", ref: "Марка: 9:33", text: "«Про що ви сперечалися в дорозі?»." },
{ book: "Марка", chapter: 9, verse: "35", ref: "Марка: 9:35", text: "«Хто хоче бути першим, той має бути останнім і всім служити»." },
{ book: "Марка", chapter: 9, verse: "37", ref: "Марка: 9:37", text: "«Той, хто приймає таку малу дитину в моє ім’я, приймає і мене. Хто ж приймає мене, приймає не тільки мене, але й того, хто мене послав»." },
{ book: "Марка", chapter: 9, verse: "39-50", ref: "Марка: 9:39-50", text: "«Не перешкоджайте йому. Жодна людина, яка моїм іменем здійснює могутнє діло, не може відразу після того говорити про мене щось погане. Бо, хто не проти нас, той за нас. Правду кажу вам: хто напоїть вас кухлем води за те, що ви належите Христу, той нізащо не втратить своєї нагороди. Однак якщо хтось стане каменем спотикання для когось із цих малих, що мають віру, то ліпше було б, якби йому на шию повісили жорно, подібне до того, яке обертає осел, і кинули його в море. Якщо твоя рука доводить тебе до спотикання, відсічи її. Ліпше отримати життя, будучи калікою, ніж з двома руками піти в геє́ну, у вогонь невгасимий. —— І, якщо твоя нога доводить тебе до спотикання, відсічи її. Ліпше отримати життя, будучи калікою, ніж з двома ногами бути вкинутим у геє́ну. —— І, якщо око доводить тебе до спотикання, викинь його. Ліпше тобі увійти в Боже Царство з одним оком, аніж з двома очима бути вкинутим у геє́ну, де хробаки не гинуть і вогонь не згасає. Адже кожен має бути посолений вогнем. Сіль — добра річ. Але якщо сіль втратить свої властивості, то як зробити її знову солоною? Майте сіль у собі та зберігайте між собою мир»." },
{ book: "Марка", chapter: 10, verse: "3", ref: "Марка: 10:3", text: "«А що наказав вам Мойсей?»." },
{ book: "Марка", chapter: 10, verse: "5-9", ref: "Марка: 10:5-9", text: "«Серця ваші зачерствілі, тому Мойсей написав вам цю заповідь. Але, як було написано, на початку творення “він створив їх як чоловіка і жінку. Тому покине чоловік батька і матір, і вони обоє стануть одним тілом”, так що їх уже не двоє, вони — одне тіло. Отже, що Бог з’єднав одним ярмом, нехай жодна людина не розділяє»." },
{ book: "Марка", chapter: 10, verse: "11, 12", ref: "Марка: 10:11, 12", text: "«Хто розлучається зі своєю дружиною і одружується з іншою, той чинить перелюб, кривдячи першу дружину. І якщо жінка, розлучившись з чоловіком, одружується з іншим, то чинить перелюб»." },
{ book: "Марка", chapter: 10, verse: "14, 15", ref: "Марка: 10:14, 15", text: "«Пустіть діток до мене, не перешкоджайте їм, бо саме таким належить Боже Царство. Правду кажу вам: якщо хтось не прийме Боже Царство так, як дитя, то нізащо в нього не ввійде»." },
{ book: "Марка", chapter: 10, verse: "18, 19", ref: "Марка: 10:18, 19", text: "«Чому називаєш мене добрим? Ніхто не є добрим, крім одного — Бога. Ти ж знаєш заповіді: “Не вбивай, не чини перелюбу, не кради, не давай неправдивого свідчення, нікого не оббирай, шануй батька і матір”»." },
{ book: "Марка", chapter: 10, verse: "21", ref: "Марка: 10:21", text: "«Одного тобі бракує: піди продай усе, що маєш, і роздай гроші бідним. Так ти збереш собі скарб у небі. А тоді приходь та будь моїм учнем»." },
{ book: "Марка", chapter: 10, verse: "23", ref: "Марка: 10:23", text: "«Як важко буде тим, хто має гроші, ввійти в Боже Царство!»." },
{ book: "Марка", chapter: 10, verse: "24, 25", ref: "Марка: 10:24, 25", text: "«Діти, як же важко ввійти в Боже Царство! Легше верблюдові пролізти крізь вушко голки, ніж багатому ввійти в Боже Царство»." },
{ book: "Марка", chapter: 10, verse: "27", ref: "Марка: 10:27", text: "«Для людей це неможливо, але не для Бога, бо для Бога можливо все»." },
{ book: "Марка", chapter: 10, verse: "29-31", ref: "Марка: 10:29-31", text: "«Правду кажу вам: немає нікого, хто заради мене й доброї новини покинув би дім, чи братів, чи сестер, чи матір, чи батька, чи дітей, чи поля́ і не отримав би у цей час, коли зноситиме переслідування, у 100 разів більше домів, братів, сестер, матерів, дітей і полів, а в прийдешньому віці — вічне життя. Однак багато перших стануть останніми, а останні — першими»." },
{ book: "Марка", chapter: 10, verse: "33-34", ref: "Марка: 10:33-34", text: "«Ось ми йдемо до Єрусалима, і Син людський буде відданий у руки старших священиків та книжників. Вони засудять його на смерть і віддадуть людям з інших народів. З нього будуть насміхатися, на нього будуть плювати, його бичуватимуть, а потім вб’ють, але через три дні він воскресне»." },
{ book: "Марка", chapter: 10, verse: "36", ref: "Марка: 10:36", text: "«Що ви хочете, щоб я для вас зробив?»." },
{ book: "Марка", chapter: 10, verse: "38", ref: "Марка: 10:38", text: "«Ви не знаєте, чого просите. Чи можете пити чашу, яку я п’ю, або хреститися хрещенням, яким я хрещусь?»." },
{ book: "Марка", chapter: 10, verse: "39, 40", ref: "Марка: 10:39, 40", text: "«Чашу, яку я п’ю, ви справді будете пити, і хрещенням, яким я хрещусь, ви охреститесь. А хто сидітиме праворуч чи ліворуч від мене, вирішую не я. Ці місця належать тим, для кого вони приготовані»." },
{ book: "Марка", chapter: 10, verse: "42-45", ref: "Марка: 10:42-45", text: "«Ви знаєте, що ті, кого вважають правителями народів, панують над людьми і видатні особи володарюють над ними. Проте серед вас так не має бути, а, навпаки, хто хоче бути поміж вами великим, той повинен стати вашим слугою, і, хто хоче бути першим серед вас, той повинен стати для всіх рабом. Бо й Син людський прийшов не для того, щоб йому служили, а щоб послужити і віддати своє життя як викуп за багатьох»." },
{ book: "Марка", chapter: 10, verse: "49", ref: "Марка: 10:49", text: "«Покличте його до мене»." },
{ book: "Марка", chapter: 10, verse: "51", ref: "Марка: 10:51", text: "«Що ти хочеш, аби я для тебе зробив?»." },

    const state = {
      data: quotes.slice(),
      q: "",
      filterBook: ""
    };

    const el = {
      list: document.getElementById('list'),
      q: document.getElementById('q'),
      bookFilter: document.getElementById('bookFilter'),
      count: document.getElementById('count'),
      activeFilter: document.getElementById('activeFilter'),
      downloadBtn: document.getElementById('downloadBtn'),
      empty: document.getElementById('empty')
    };

    function uniqueBooks(data) {
      const s = new Set(data.map(x => x.book).filter(Boolean));
      return Array.from(s).sort();
    }

    function buildBookOptions() {
      const books = uniqueBooks(state.data);
      el.bookFilter.innerHTML = '<option value="">All books</option>';
      for (const b of books) {
        const opt = document.createElement('option');
        opt.value = b;
        opt.textContent = b;
        el.bookFilter.appendChild(opt);
      }
    }

    function matches(q, item) {
      if (!q) return true;
      q = q.toLowerCase();
      return (item.text && item.text.toLowerCase().includes(q)) ||
             (item.ref && item.ref.toLowerCase().includes(q)) ||
             (item.book && item.book.toLowerCase().includes(q));
    }

    function render() {
      const qv = el.q.value.trim();
      const bf = el.bookFilter.value;
      let visible = state.data.filter(item => matches(qv, item));
      if (bf) visible = visible.filter(it => it.book === bf);

      el.list.innerHTML = '';
      if (visible.length === 0) {
        el.empty.style.display = 'block';
      } else {
        el.empty.style.display = 'none';
        for (const it of visible) {
          const card = document.createElement('article');
          card.className = 'card';
          const txt = document.createElement('div');
          txt.className = 'quote-text';
          txt.textContent = it.text;
          if(it.type === "order") {
              txt.classList.add("order");
          }
          const ref = document.createElement('div');
          ref.className = 'ref';
          ref.innerHTML = `<strong>${it.ref}</strong>`;

          const actions = document.createElement('div');
          actions.className = 'small-actions';
          const copyBtn = document.createElement('button');
          copyBtn.className = 'button';
          copyBtn.textContent = 'Copy';
          copyBtn.onclick = () => {
            navigator.clipboard.writeText(`${it.text} — ${it.ref}`)
              .then(() => {
                copyBtn.textContent = 'Copied!';
                setTimeout(() => copyBtn.textContent = 'Copy', 800);
              });
          };
          actions.appendChild(copyBtn);

          ref.appendChild(actions);
          card.appendChild(txt);
          card.appendChild(ref);

          el.list.appendChild(card);
        }
      }

      el.count.textContent = `Showing ${visible.length} of ${state.data.length} quotes`;
      el.activeFilter.textContent = bf || 'All books';
    }

    function wireEvents() {
      el.q.addEventListener('input', render);
      el.bookFilter.addEventListener('change', render);
      el.downloadBtn.addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'jesus-quotes.json';
        a.click();
        URL.revokeObjectURL(url);
      });
    }

    (function init() {
      buildBookOptions();
      wireEvents();
      render();
    })();
  </script>
