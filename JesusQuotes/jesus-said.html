<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sayings of Jesus — Olive Garden Feast Style</title>
  <style>
    :root {
      --bg: #E8E5D5;
      --card: #F4F1E1;
      --text: #3A3C2F;
      --muted: #7A7D5E;
      --accent: #8C9A00;
      --border: #C0BCAD;
      --pill-bg: #D0D3A4;
      --radius: 12px;
      font-family: Inter, system-ui, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1800px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 48px;
      height: 48px;
      background-color: var(--accent);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: var(--bg);
      font-size: 24px;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    p.lead {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .search {
      display: flex;
      align-items: center;
      background-color: var(--card);
      padding: 6px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .search input {
      border: none;
      background: transparent;
      outline: none;
      color: var(--text);
      font-size: 1rem;
      width: 250px;
    }

    .select, .button {
      background-color: var(--card);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      cursor: pointer;
    }

    .button {
      /* small hover effect */
    }

    .icon {
      color: var(--muted);
      font-size: 1rem;
    }

    main {
      margin-top: 20px;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .count {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .pill {
      background-color: var(--pill-bg);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
      gap: 16px;
    }

    .card {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .quote-text {
      font-size: 1rem;
      line-height: 1.4;
    }
    
    .quote-text.order {
      color: red;
    }

    .ref {
      font-size: 0.85rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .small-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    footer {
      margin-top: 32px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    /* Focus styles */
    input:focus, select:focus, button:focus {
      outline: 2px solid var(--accent);
    }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">J</div>
        <div>
          <h1>Sayings of Jesus</h1>
          <p class="lead">Search and browse Jesus’s quotes in a clean olive-garden feast style.</p>
        </div>
      </div>

      <div class="controls">
        <div class="search" title="Search quotes">
          <span class="icon">🔍</span>
          <input id="q" placeholder="Search quotes or verse" aria-label="Search quotes">
        </div>

        <select id="bookFilter" class="select" aria-label="Filter by book">
          <option value="">All books</option>
        </select>

        <button id="downloadBtn" class="button">Export JSON</button>
      </div>
    </header>

    <main>
      <div class="meta">
        <div class="count" id="count">Showing 0 quotes</div>
        <div style="flex:1"></div>
        <div class="pill" id="activeFilter">All books</div>
      </div>

      <section class="grid" id="list" aria-live="polite"></section>
      <div id="empty" style="display:none; color: var(--muted); margin-top: 16px;">
        No quotes found.
      </div>
    </main>

    <footer>
      Sample includes public-domain KJV quotes. Replace with your own JSON data if needed.
    </footer>
  </div>

  <script>
    const quotes = [
{ book: "Матвія", chapter: 4, verse: "4", ref: "Матвія: 4:4", text: "«Написано: “Не хлібом самим повинна жити людина, а кожним словом, що виходить з уст Єгови”».", /*type: "order" */ },
{ book: "Матвія", chapter: 4, verse: "7", ref: "Матвія: 4:7", text: "«А ще написано: “Не випробовуй Єгову, Бога твого”»." },
{ book: "Матвія", chapter: 4, verse: "10", ref: "Матвія: 4:10", text: "«Відійди, Сатано! Бо написано: “Поклоняйся лише Єгові, Богу твоєму, і тільки йому служи”»." },
{ book: "Матвія", chapter: 4, verse: "17", ref: "Матвія: 4:17", text: "«Покайтесь, бо наблизилося Царство небесне»." },
{ book: "Матвія", chapter: 4, verse: "19", ref: "Матвія: 4:19", text: "«Ходіть за мною, і я зроблю вас ловцями людей»." },
{ book: "Матвія", chapter: 5, verse: "всі", ref: "Матвія: 5-7", text: "«Щасливі ті, хто усвідомлює свої духовні потреби, оскільки їм належить Царство небесне. Щасливі засмучені, бо вони будуть потішені. Щасливі лагідні, бо вони успадкують землю. Щасливі голодні та спраглі праведності, бо вони наситяться. Щасливі милосердні, бо їм буде виявлено милосердя. Щасливі чисті серцем, бо вони побачать Бога. Щасливі миротворці, бо їх буде названо Божими синами. Щасливі ті, кого переслідують за праведність, бо їм належить Царство небесне. Щасливі ви, коли через мене люди ганьблять та переслідують вас і наговорюють на вас усіляку неправду. Тіштеся і переповнюйтесь радістю, бо в небі вас чекає велика нагорода. Так само переслідували і пророків, що були до вас. Ви — сіль землі. Якщо ж сіль втратить свої властивості, то як зробити її знову солоною? Вона вже ні до чого не придатна, тому її викидають геть і топчуть. Ви — світло для світу. Якщо місто розташоване на горі, воно не може сховатися. І коли запалюють світильник, то ставлять його не під кошик, а на підставку, і він світить для всіх у домі. Подібно й ваше світло нехай світить перед людьми, щоб вони бачили ваші добрі вчинки і прославляли вашого небесного Батька. Не думайте, що я прийшов скасувати Закон та Пророків. Не скасувати я прийшов, а виконати. Правду кажу вам: швидше зникнуть небо і земля, аніж зникне із Закону хоча б одна найменша літера чи рисочка літери, перш ніж сповниться все написане в ньому. Отже, хто порушить одну з цих найменших заповідей і навчатиме інших робити так, буде названий найменшим у небесному Царстві. А хто буде їх виконувати і навчати інших робити так, буде названий найбільшим у небесному Царстві. Кажу вам: якщо ви не будете праведніші від книжників і фарисеїв, то нізащо не ввійдете в небесне Царство. Ви чули, що було сказано в давнину: “Не вбивай. Хто ж скоїть убивство, буде відповідати перед судом”. Проте кажу вам: кожен, хто не припиняє гніватись на свого брата, теж буде відповідати перед судом. Хто ж зневажить свого брата ганебними словами, відповідатиме перед найвищим судом. А хто скаже: “Ти нікчемний дурень!” — заслуговуватиме покарання у вогняній геє́ні. Коли ж ти принесеш дар до жертовника і там пригадаєш, що твій брат має щось проти тебе, залиш дар перед жертовником. Спочатку піди примирися з братом, а тоді повернись і принеси свій дар. Швидко залагоджу справи з тим, хто судиться з тобою, поки ще йдеш з ним до суду, щоб він не видав тебе судді, а суддя — судовому виконавцю і щоб тебе не кинули до в’язниці. Запевняю тебе: ти не вийдеш звідти, поки не віддаси свою останню дрібну монету. Ви чули, що було сказано: “Не чини перелюбу”. А я вам кажу: кожен, хто не припиняє дивитись на жінку, розпалюючись до неї пристрастю, уже вчинив з нею перелюб у своєму серці. Тож, якщо твоє праве око доводить тебе до спотикання, вирви його й викинь. Бо ліпше, щоб ти втратив одну частину тіла, ніж щоб усе твоє тіло було вкинуте до геє́ни. Також, якщо права рука доводить тебе до спотикання, відсічи її і викинь. Бо ліпше, щоб ти втратив одну частину тіла, ніж щоб усе твоє тіло опинилося в геє́ні. Крім того, сказано: “Хто розлучається зі своєю дружиною, нехай дасть їй свідоцтво про розлучення”. А я вам кажу: кожен, хто розлучається зі своєю дружиною не через статеву розпусту, наражає її на перелюб, і той, хто одружується з розлученою, чинить перелюб. Також ви чули, що людям у давнину було сказано: “Не клянись, якщо не зможеш виконати свої обітниці, а виконуй обітниці перед Єговою”. А я вам кажу: не кляніться взагалі — ані небом, бо це престол Бога, ані землею, бо вона підніжок для його ніг, ані Єрусалимом, бо це місто великого Царя. Не кляніться своєю головою, тому що жодної волосини не можете зробити білою або чорною. Нехай ваше слово “так” означає “так”, а “ні” — “ні”, бо все, що більше за це,— від Злого. Ви чули, що сказано: “Око за око і зуб за зуб”. А я кажу вам: не противтеся лихій людині. Хто вдарить тебе по правій щоці, підстав йому й ліву. І, якщо хтось захоче судитися з тобою та забрати в тебе спідній одяг, віддай йому і верхній. І, якщо хтось наділений владою змусить тебе пройти милю, пройди з ним дві. Тому, хто просить, давай і від того, хто хоче позичити в тебе, не відвертайся. Ви чули, що сказано: “Люби свого ближнього і ненавидь свого ворога”. А я вам кажу: не переставайте любити своїх ворогів і молитися за своїх гонителів. Так ви станете синами вашого небесного Батька, адже він наказує сонцю своєму сходити над людьми добрими і поганими та посилає дощ на праведних і неправедних. Бо якщо ви любите тих, хто любить вас, то яка вам за це нагорода? Хіба не те саме роблять і збирачі податків? І якщо вітаєтесь тільки зі своїми братами, то хіба робите щось надзвичайне? Хіба й люди з інших народів не роблять так само? Тож будьте досконалі, як і ваш небесний Батько. Будьте обережні: не виставляйте своєї праведності напоказ, бажаючи привернути увагу людей,а інакше не отримаєте нагороди від небесного Батька. Тому, коли даєш дари милосердя, не сурми перед собою, як це роблять лицеміри в синагогах і на вулицях, щоб вихваляли їх люди. Правду кажу вам: вони вже отримали свою нагороду сповна. Коли даєш дари милосердя, нехай твоя ліва рука не знає, що робить права, щоб твої дари були непомітні для сторонніх очей. Тоді Батько, який непомітно спостерігає за всім, винагородить тебе. Також, коли молитесь, не поводьтеся так, як лицеміри, котрі люблять молитися, стоячи в синагогах та на розі головних вулиць, щоб їх бачили люди. Правду кажу вам: вони вже отримали свою нагороду сповна. Ти ж, коли молишся, увійди до своєї кімнати і, зачинивши за собою двері, помолися до Батька, якого не видно. Тоді Батько, що непомітно спостерігає за всім, винагородить тебе. Молячись, не повторюйте одне і те ж, як люди з інших народів, бо вони думають, що будуть вислухані за своє багатослів’я. Тож не уподібнюйтесь до них, адже ваш Батько знає, що́ вам потрібно, ще навіть до того, як ви попросите в нього. Ви ж моліться так: “Батьку наш, що на небесах, нехай освячується твоє ім’я. Нехай прийде твоє Царство. Нехай виконується твоя воляк як на небі, так і на землі. Дай нам сьогодні хліба на цей день і прости нам борги наші, як і ми простили своїм боржникам. І не допусти, щоб ми піддалися спокусі, але визволь від Злого”. Бо якщо ви будете прощати людям їхні проступки, то й ваш небесний Батько прощатиме вам, а якщо не будете прощати людям їхні проступки, то й Батько не простить ваших. Відтепер, коли постите, не вдавайте із себе сумних, як це роблять лицеміри, бо вони напускають на себе вигляд мучеників, аби люди бачили, що вони постять. Правду кажу вам: вони вже отримали свою нагороду сповна. Ти ж, коли постиш, намасти олією свою голову та вмий лице, щоб твій піст бачили не люди, а тільки Батько твій, якого не видно. Тоді Батько, який непомітно спостерігає за всім, винагородить тебе. Перестаньте складати собі скарби на землі, де їх нищить міль та іржа і де злодії вдираються та крадуть. Натомість складайте собі скарби у небі, де їх не нищить ані міль, ані іржа і де злодії не вдираються й не крадуть. Бо, де твій скарб, там буде і твоє серце. Око — це світильник для тіла. Отже, якщо твоє око зосереджене, то й усе тіло твоє буде світле. Проте якщо твоє око заздрісне, то й усе тіло буде темне. Коли ж світло, що в тобі, насправді є темрявою, то яка ж велика ця темрява! Ніхто не може бути рабом двох панів, бо якщо одного з них він любитиме й буде горнутися до нього, то другого обов’язково зненавидить або принаймні ним знехтує. Не можете бути рабами Бога і багатства. Тому говорю вам: перестаньте тривожитись про своє життя — що вам їсти чи що пити, а також про свої тіла — у що одягатися. Хіба життя не цінніше від поживи, а тіло — від одягу? Поспостерігайте уважно за птахами небесними: вони не сіють, не жнуть, не збирають у комори, але ваш небесний Батько їх годує. Хіба ви не цінніші від них? Хто з вас тривогою може продовжити собі життя хоча б на лікоть? І чому тривожитеся про одяг? Навчіться з того, як ростуть польові лілії: вони не трудяться і не прядуть, але говорю вам, що навіть Соломон у всій своїй славі не одягався так, як одна з них. Тож якщо Бог так одягає рослинку в полі, яка сьогодні є, а завтра буде вкинена в піч, то чи ж не одягне він вас, маловіри? Тому ніколи не тривожтеся і не кажіть: “Що нам їсти?”, або “Що пити?”, або “У що одягатися?”. Бо за всім цим постійно женуться інші народи. Але ваш небесний Батько знає, що ви всього цього потребуєте. Отже, і далі шукайте найперше Царства і Божої праведності, а все те інше вам додасться. Ніколи не тривожтесь про завтра, бо завтрашній день принесе свої тривоги. Кожен день має досить своїх клопотів. Перестаньте судити, щоб і вас не судили. Бо, яким судом судите ви, таким судитимуть і вас і, якою мірою міряєте ви, такою відміряють вам. Чому ти дивишся на скалку в оці свого брата, а колоду у власному оці не помічаєш? І як можеш казати братові: “Дозволь мені вийняти скалку з твого ока”, якщо у своєму оці маєш колоду? Лицеміре! Спочатку вийми зі свого ока колоду, і тоді чітко побачиш, як вийняти з братового ока скалку. Не давайте святого псам і не кидайте перлів свиням, щоб вони не затоптали їх та, обернувшись, не роздерли вас. Невпинно просіть — і отримаєте, шукайте — і знайдете, стукайте — і вам відчинять. Бо кожен, хто просить,— отримає, хто шукає — знайде, а хто стукає — тому відчинять. Хіба хтось із вас дасть своєму синові камінь, якщо той попросить хліба? І хіба дасть йому змію, якщо той попросить риби? Отже, якщо ви, хоча й грішні, знаєте, як давати своїм дітям добрі дари, то тим більше ваш небесний Батько дасть усього доброго тим, хто просить у нього! Тож усе, що хочете, аби робили вам люди, те робіть їм і ви, бо в цьому вся суть Закону і Пророків. Входьте вузькими ворітьми, бо широкі ворота і простора дорога ведуть до знищення, і багато хто входить ними. Натомість вузькі ворота й тісна дорога ведуть до життя, і мало хто знаходить її. Стережіться лжепророків, які приходять в одежі овечій, а всередині вони хижі вовки. Ви розпізна́єте їх по їхніх плодах. Хіба збирають з тернів виноград чи з будяків фіги? Так само всяке добре дерево приносить добрі плоди, а погане дерево — погані. Добре дерево не може давати погані плоди, а погане дерево — добрі. Кожне дерево, яке не приносить добрих плодів, зрубують і кидають у вогонь. Тож по їхніх плодах розпізна́єте їх. Не кожен, хто каже до мене: “Господи, Господи”, увійде в Царство небесне, а тільки той, хто чинить волю мого Батька, який на небі. Багато хто скаже мені того дня: “Господи, Господи, хіба не твоїм ім’ям ми пророкували і не твоїм ім’ям виганяли демонів? Хіба не твоїм ім’ям здійснювали багато могутніх діл?” Тоді я скажу їм: “Я ніколи не знав вас! Відійдіть від мене, ті, хто чинить беззаконня!” Тому кожен, хто чує ці слова та виконує їх, буде подібний до розсудливого чоловіка, який побудував свій дім на скелі. І, коли полив дощ, прийшла повінь, подули вітри й налетіли на дім, він не завалився, бо його фундамент був закладений на скелі. А кожен, хто чує ці слова та їх не виконує, буде подібний до чоловіка безглуздого, який побудував свій дім на піску. І, коли полив дощ, прийшла повінь, подули вітри й налетіли на дім, він завалився, і великим було його падіння»." },
{ book: "Матвія", chapter: 8, verse: "2", ref: "Матвія: 8:2", text: "«Хочу! Будь чистим»." },
{ book: "Матвія", chapter: 8, verse: "4", ref: "Матвія: 8:4", text: "«Дивись, нікому не говори про це, а піди покажись священику і принеси дар, як визначив Мойсей, — їм на свідчення»" },
{ book: "Матвія", chapter: 8, verse: "7", ref: "Матвія: 8:7", text: "«Я прийду і зцілю його»." },
{ book: "Матвія", chapter: 8, verse: "10-11", ref: "Матвія: 8:10-11", text: "«Кажу вам правду: ні в кого в Ізра́їлі я не знайшов такої сильної віри. Але говорю вам: багато хто прийде зі сходу і заходу та сяде за столом з Авраамом, Ісаком і Яковом у небесному Царстві, а сини Царства будуть викинені геть у темряву. Там вони будуть плакати й скреготати зубами»." },
{ book: "Матвія", chapter: 8, verse: "13", ref: "Матвія: 8:13", text: "«Іди. Нехай буде тобі згідно з твоєю вірою»." },
{ book: "Матвія", chapter: 8, verse: "20", ref: "Матвія: 8:20", text: "«Лисиці мають нори, а небесні птахи — гнізда, Син же людський не має де голови прихилити»." },
{ book: "Матвія", chapter: 8, verse: "22", ref: "Матвія: 8:22", text: "«Йди за мною, а мертві нехай ховають своїх мертвих»." },
{ book: "Матвія", chapter: 8, verse: "26", ref: "Матвія: 8:26", text: "«Чому ви так налякалися, маловіри?»." },
{ book: "Матвія", chapter: 8, verse: "32", ref: "Матвія: 8:32", text: "«Ідіть!»." },
{ book: "Матвія", chapter: 9, verse: "2", ref: "Матвія: 9:2", text: "«Не бійся, дитино, твої гріхи прощено»." },
{ book: "Матвія", chapter: 9, verse: "4-6", ref: "Матвія: 9:4-6", text: "«Чому ви у своїх серцях виношуєте лихі думки? Що простіше сказати: “Твої гріхи прощено” чи “Встань і йди”? Але я хочу, щоб ви знали: Син людський має владу прощати на землі гріхи»." },
{ book: "Матвія", chapter: 9, verse: "6", ref: "Матвія: 9:6", text: "«Встань, візьми свої ноші і йди додому»." },
{ book: "Матвія", chapter: 9, verse: "9", ref: "Матвія: 9:9", text: "«Будь моїм учнем і йди за мною»." },
{ book: "Матвія", chapter: 9, verse: "12-13", ref: "Матвія: 9:12-13", text: "«Здоровим лікар не потрібний, а хворим потрібний. Тож ідіть і навчіться, що́ означають слова: “Я хочу милосердя, а не жертви”. Бо я прийшов покликати не праведних, а грішних»." },
{ book: "Матвія", chapter: 9, verse: "15-17", ref: "Матвія: 9:15-17", text: "«Хіба друзі нареченого сумують, коли він ще з ними? Однак настануть дні, коли нареченого від них заберуть. Тоді вони і будуть постити. Ніхто не пришиває до старого одягу латки з нової тканини, інакше латка збіжиться і діра стане ще більшою. Так само не наливають молодого вина в старі бурдюки, інакше бурдюки прорвуться і вино виллється, а бурдюки зіпсуються. Молоде вино наливають у нові бурдюки, щоб зберегти і те, і те»." },
{ book: "Матвія", chapter: 9, verse: "22", ref: "Матвія: 9:22", text: "«Не бійся, дочко, твоя віра зцілила тебе»." },
{ book: "Матвія", chapter: 9, verse: "28", ref: "Матвія: 9:28", text: "«Скажіть, ви вірите, що я можу це зробити?»." },
{ book: "Матвія", chapter: 9, verse: "29", ref: "Матвія: 9:29", text: "«Нехай вам буде за вашою вірою»." },
{ book: "Матвія", chapter: 9, verse: "30", ref: "Матвія: 9:30", text: "«Дивіться, щоб ніхто не дізнався про це»." },
{ book: "Матвія", chapter: 9, verse: "37-38", ref: "Матвія: 9:37-38", text: "«Жниво велике, а робітників мало. Тож благайте Господаря жнив, щоб він вислав робітників на свої жнива»." },
{ book: "Матвія", chapter: 10, verse: "5-42", ref: "Матвія: 10:5-42", text: "«Не виходьте на дорогу, яка веде до інших народів, і не заходьте в жодне самарı́йське місто, а йдіть до загублених овець з народу Ізра́їля. Коли ж будете йти, проповідуйте: “Наблизилося Царство небесне”. Зціляйте хворих, воскрешайте померлих, очищайте прокажених і виганяйте демонів. Даром отримали — даром давайте. Не складайте собі в пояси ні золота, ні срібла, ні міді і не беріть у дорогу ні торби, ні одягу на заміну, ні сандалій, ні палиці, бо робітник вартий своєї поживи. В яке тільки місто чи село увійдете, шукайте в ньому достойних людей і залишайтесь там, аж поки не підете далі. Увійшовши в дім, вітайте його мешканців, і, якщо дім достойний, нехай мир, якого бажаєте йому, прийде в нього, а якщо не достойний, то нехай ваш мир повернеться до вас. Коли ж хтось вас не прийме або не слухатиме ваших слів, то, виходячи з того дому чи міста, обтрусіть порох зі своїх ніг. Правду кажу вам: землı́ Содома і Гоморри в Судний день буде легше, аніж тому місту. Ось я посилаю вас як овець поміж вовків, тож будьте обережні, як змії, і невинні, як голуби. Остерігайтесь людей, бо вони віддаватимуть вас місцевим судам і бичуватимуть у своїх синагогах. Через мене вас поведуть до правителів та царів, і це дасть вам нагоду свідчити їм, а також людям з інших народів. Але коли вас віддадуть до суду, не тривожтеся, як і що говорити, бо тоді вам буде дано, що сказати. Адже не самі ви будете говорити: через вас говоритиме дух вашого Батька. І віддасть брат брата на смерть, а батько дитину. Діти повстануть проти батьків та віддадуть їх на смерть. І за моє ім’я всі будуть вас ненавидіти, але хто витримає до кінця, той спасеться. Коли ж вас переслідуватимуть в одному місті, втікайте до іншого, бо правду кажу вам: не встигнете обійти всі міста Ізра́їля, як прийде Син людський. Учень не більший від свого вчителя, а раб — від свого господаря. Тож учневі достатньо стати як його вчитель, а рабу — як його господар. Якщо люди називають господаря дому Вельзеву́лом, то хіба не назвуть так само його домашніх? Отже, не бійтеся їх, бо немає нічого прихованого, що не розкриється, і нічого таємного, що не стане явним. Що говорю вам у темряві, говоріть при світлі і, що говорю пошепки, проповідуйте з дахів. Не бійтеся тих, хто вбиває тіло, але душу вбити не може; радше бійтеся того, хто може як тіло, так і душу погубити в геє́ні. Хіба не продають двох горобців за одну дрібну монету? Однак жоден з них не впаде на землю без відома вашого Батька. А у вас навіть волосся на голові пораховане. Тож не бійтеся, ви цінніші від багатьох горобців. Хто визнає́ мене перед людьми, того ви́знаю і я перед моїм небесним Батьком. А хто зрікається мене перед людьми, того і я зречуся перед моїм небесним Батьком. Не думайте, що я прийшов принести на землю мир; я прийшов принести не мир, а меч. Бо я прийшов порізнити сина з батьком, дочку з матір’ю, а невістку зі свекрухою. І ворогами людині стануть її ж домашні. Хто любить батька чи матір більше, ніж мене, той мене не гідний, і, хто любить сина чи дочку більше, ніж мене, той мене не гідний. Хто не приймає свого стовпа мук і не йде за мною, той не гідний мене. Хто врятує свою душу, той погубить її, а хто погубить свою душу заради мене, той її врятує. Хто приймає вас, приймає і мене, а хто приймає мене, приймає і того, хто мене послав. Хто приймає пророка, тому що той пророк, отримає таку ж нагороду, як пророк, і той, хто приймає праведника, тому що той праведник, отримає таку ж нагороду, як праведник. Правду кажу вам: хто напоїть одного з цих малих хоча б кухлем холодної води, тому що той є учнем, нізащо не втратить своєї нагороди»." },
{ book: "Матвія", chapter: 11, verse: "4-6", ref: "Матвія: 11:4-6", text: "«Ідіть і розкажіть Іванові, що́ ви чуєте й бачите: сліпі прозрівають, кульгаві ходять, прокажені стають чистими, глухі чують, мертві воскресають, а бідним звіщають добру новину. Щасливий той, для кого я не став каменем спотикання»." },
{ book: "Матвія", chapter: 11, verse: "7-19", ref: "Матвія: 11:7-19", text: "«На що ви ходили дивитися в пустелю? На очеретину, яку гойдає вітер? Тож скажіть, на що ви ходили дивитися? На чоловіка, одягненого в м’які шати? Але ж ті, що носять м’які шати, перебувають у царських домах. То чому ви ходили туди? Щоб побачити пророка? Так, кажу вам, когось значно більшого, ніж пророка. Саме про нього написано: “Ось я висилаю попереду тебе посланця, який приготує дорогу перед тобою!” Правду кажу вам: серед народжених жінками не з’являвся ніхто, більший від Івана Хрестителя, проте менший у небесному Царстві — більший від нього. Починаючи від днів Івана Хрестителя й дотепер, мета, якої люди прагнуть досягти,— це небесне Царство. І досягти її зможуть ті, хто докладає для цього всіх зусиль. Бо всі — і Пророки, і Закон — пророкували аж до Івана; і, якщо хочете знати, він — “Ілля, який має прийти”. Хто має вуха, нехай слухає. З ким можна порівняти це покоління? Воно подібне до малих дітей, які сидять на ринковій площі й вигукують своїм товаришам: “Ми грали вам на флейті, а ви не танцювали, ми голосили, а ви не горювали і не били себе в груди”. Так само прийшов Іван — не їсть і не п’є, а люди кажуть: “Він має демона”. Прийшов Син людський — їсть і п’є, а люди кажуть: “Цей чоловік — ненажера і любить пити вино, він приятель збирачам податків і грішникам”. Так чи інакше, мудрість доводить свою праведність вчинками»." },
{ book: "Матвія", chapter: 11, verse: "21-24", ref: "Матвія: 11:21-24", text: "«Горе тобі, Хоразı́не! Горе тобі, Віфсаї́до! Бо якби могутні діла, виконані у вас, виконалися в Тирі та Сидо́ні, то вони б уже давно покаялись у мішковині й попелі. Тому кажу: в Судний день Тиру і Сидо́ну буде легше, ніж вам. І ти, Капернау́ме, думаєш, що піднімешся до неба? Упадеш ти в могилу, бо якби могутні діла, виконані в тобі, виконалися в Содомі, то він залишився б аж до цього дня. Тому кажу: в Судний день землı́ содомській буде легше, ніж тобі»." },
{ book: "Матвія", chapter: 1, verse: "25-30", ref: "Матвія: 11:25-30", text: "«Батьку, Господи неба і землі, славлю тебе перед усіма, бо ти заховав це від мудрих та розумних, а відкрив малим дітям. Адже так, Батьку, було тобі до вподоби. Мій Батько передав мені все, і ніхто не знає усього про Сина — тільки Батько. Так само ніхто не знає усього про Батька — тільки Син і кожен, кому Син хоче відкрити його. Прийдіть до мене, всі струджені та обтяжені, і я відсвіжу вас. Візьміть на себе ярмо моє і навчіться від мене, тому що я лагідний та смиренний, і знайдете для себе відсвіження, бо ярмо моє зручне і ноша легка»." },
{ book: "Матвія", chapter: 12, verse: "3-8", ref: "Матвія: 12:3-8", text: "«Хіба ви не читали, що́ зробив Давид, коли він і його люди зголодніли? Не читали, як він увійшов у Божий дім і як вони їли хліби представлення? Але це не дозволялося ні йому, ні тим, хто був з ним, їх могли їсти тільки священики. І хіба ви не читали в Законі, що, хоча священики у храмі працюють в суботу, вони залишаються невинними? Проте кажу вам: тут хтось більший, ніж храм. Та якби ви зрозуміли, що означають слова: “Я хочу милосердя, а не жертви”, то не засуджували б невинних. Адже Син людський має владу над суботою»." },
{ book: "Матвія", chapter: 12, verse: "11-12", ref: "Матвія: 12:11-12", text: "«Якби ви мали одну вівцю і вона в суботу впала б у яму, то хто з вас не витягнув би її? Наскільки ж людина цінніша від вівці! Тому робити добро в суботу дозволено»." },
{ book: "Матвія", chapter: 12, verse: "13", ref: "Матвія: 12:13", text: "«Простягни руку»." },
{ book: "Матвія", chapter: 12, verse: "25-37", ref: "Матвія: 12:25-37", text: "«Кожне царство, в якому виникає поділення, буде зруйноване, і кожне місто чи дім, в якому виникає поділення, не встоїть. Так само якщо Сатана виганяє Сатану, то він поділився сам у собі. Як же тоді встоїть його царство? І якщо я виганяю демонів з допомогою Вельзеву́ла, то з чиєю допомогою виганяють їх ваші сини? Тому ваші ж сини будуть вам суддями. А якщо я виганяю демонів за допомогою Божого духу, то Боже Царство дійсно прийшло несподівано для вас. І ще: як може хтось вдертися в дім сильного чоловіка та заволодіти його майном, якщо спочатку не зв’яже того чоловіка? Лише тоді він зможе пограбувати дім. Хто не зі мною, той проти мене, і, хто не збирає зі мною, той розсипає. Тому кажу вам: усякий гріх та зневажливі слова буде прощено людям, але зневажливі слова проти духу прощено не буде. Наприклад, хто скаже слово проти Сина людського, тому буде прощено, а хто говоритиме проти святого духу, тому не буде прощено ані в цьому віці, ані в прийдешньому. Якщо ваше дерево добре, то й плоди його добрі, а якщо ваше дерево погане, то й плоди його погані, бо дерево пізнає́ться по його плодах. Роде гадючий, хіба ви, будучи грішними, можете говорити щось добре? Бо, чим переповнене серце, те говорять уста. Добра людина зі свого доброго скарбу дає добрі речі, а погана людина з поганого скарбу дає погані. Говорю вам: люди дадуть відповідь Судного дня за кожне марне слово, яке скажуть, бо за свої слова будеш визнаний праведним і за свої слова будеш засуджений»." },
{ book: "Матвія", chapter: 12, verse: "39-45", ref: "Матвія: 12:39-45", text: "«Неправедне і перелюбне покоління постійно шукає знакa, але воно не отримає жодного, крім знаку, даного через пророка Йо́ну. Бо, як Йо́на був у череві велетенської риби три дні і три ночі, так само й Син людський буде в серці землі три дні і три ночі. У час суду ніневітя́ни воскреснуть разом із цим поколінням і засудять його, бо вони покаялися, почувши звістку, яку проповідував Йо́на. А тут хтось більший від Йо́ни! У час суду цариця з півдня воскресне разом з цим поколінням і засудить його, бо вона прийшла з краю землі, щоб послухати Соломонову мудрість. А тут хтось більший від Соломона! Коли нечистий дух виходить з людини, він іде безводними місцями, шукаючи пристановища, але нічого не знаходить. Тоді він каже: “Повернусь я у дім, з якого виселився”,— і, прийшовши, бачить, що дім не зайнятий, а виметений та прикрашений. Після того дух іде й приводить із собою сімох інших духів, ще зліших за нього, і, поселившись у домі, вони там живуть. І це ще гірше для людини, ніж те, що було спочатку. Саме так буде з цим неправедним поколінням»." },
{ book: "Матвія", chapter: 12, verse: "48-50", ref: "Матвія: 12:48-50", text: "«Хто моя мати і хто мої брати?— і, показавши рукою на своїх учнів, сказав: — Ось моя мати і мої брати! Бо кожен, хто виконує волю мого небесного Батька, є мені братом, і сестрою, і матір’ю»." },
{ book: "Матвія", chapter: 13, verse: "3-9", ref: "Матвія: 13:3-9", text: "«Якось сіяч вийшов сіяти. Коли він сіяв, трохи насіння впало при дорозі, але прилетіли птахи і повидзьобували його. Ще трохи насіння впало на кам’янисту землю, де було мало ґрунту. Насіння відразу проросло, бо ґрунт був неглибокий. Та коли зійшло сонце, то спалило його, і воно засохло, оскільки не мало коріння. Ще трохи насіння впало між терни, але терни виросли й заглушили його. А ще трохи насіння впало на добрий ґрунт і почало давати плоди: одне — у 100 разів більше, ніж було посіяно, інше — в 60, а ще інше — в 30. Хто має вуха, нехай слухає»." },
{ book: "Матвія", chapter: 13, verse: "11-23", ref: "Матвія: 13:11-23", text: "«Вам дано зрозуміти священні таємниці небесного Царства, а їм не дано. Бо кожен, хто має, отримає ще більше і матиме вдосталь, а в того, хто не має, заберуть навіть те, що він має. Тому я навчаю їх за допомогою прикладів, бо, дивлячись, вони дивляться даремно, і, слухаючи, слухають даремно, і не розуміють суті сказаного. На них сповнюються слова з пророцтва Ісаї: “Ви будете чути, але так і не зрозумієте суті сказаного, будете дивитися, але так і не побачите. Адже серце тих людей огрубіло, вухами вони чують, але не відгукуються, а очі свої вони заплющили, щоб нічого не бачити і нічого не чути, щоб серцем не зрозуміти суті, щоб не навернутися і щоб я їх не зцілив”. Щасливі ви, бо ваші очі бачать і ваші вуха чують. Правду кажу вам: багато пророків і праведних людей дуже хотіли побачити те, що бачите ви, але не побачили, і почути те, що чуєте ви, але не почули. А тепер послухайте приклад про сіяча. Якщо хтось чує слово про Царство, але не розуміє його суті, то приходить Злий і вириває посіяне з серця тієї людини. Так буває, коли насіння падає при дорозі. Коли ж насіння падає на кам’янисту землю, це означає, що людина чує слово і відразу приймає його з радістю, але вона не має кореня, хоча й тримається якийсь час. А як настає лихо чи переслідування за слово, вона зараз же падає. Коли ж насіння потрапляє між терни, це означає, що людина чує слово, однак тривоги цього віку і багатство, яке вводить в оману, заглушують слово, і воно не приносить жодного плоду. А коли насіння падає на добрий ґрунт, це означає, що людина чує слово та розуміє його суть. Саме такі люди і приносять плоди: одні — в 100 разів більше, інші — в 60, а ще інші — в 30»." },
{ book: "Матвія", chapter: 13, verse: "24", ref: "Матвія: 13:24", text: "«Небесне Царство можна прирівняти до чоловіка, який посіяв на полі добре насіння. Поки люди спали, прийшов його ворог, посіяв серед пшениці бур’яни та й пішов собі. А коли стебла проросли та з’явилися плоди, проросли і бур’яни. Тож прийшли раби господаря дому і сказали йому: “Пане, хіба не добре насіння ти посіяв на полі? Звідки ж взялися бур’яни?” А той відповів: “Це зробив ворог, якийсь чоловік”. Раби запитали його: “Хочеш, ми підемо і повириваємо їх?” Він же сказав: “Не треба, щоб, вириваючи бур’яни, ви часом не вирвали й пшениці. Нехай і те, і те росте разом до жнив, а під час жнив я скажу женцям спочатку позбирати бур’яни, позв’язувати їх у снопи і спалити, а потім зібрати до моєї комори пшеницю”»." },
{ book: "Матвія", chapter: 13, verse: "31", ref: "Матвія: 13:31", text: "«Небесне Царство подібне до гірчичного зернятка, яке чоловік посіяв на своєму полі. Це насіння найдрібніше з усіх, але коли виростає, то стає найбільшою городньою рослиною і робиться деревом, і небесні птахи прилітають та селяться в його вітті»." },
{ book: "Матвія", chapter: 13, verse: "33", ref: "Матвія: 13:33", text: "«Небесне Царство подібне до закваски, яку жінка взяла й змішала з трьома великими мірами борошна, так що заквасилося все тісто»." },
{ book: "Матвія", chapter: 13, verse: "37-51", ref: "Матвія: 13:37-51", text: "«Сіяч, який посіяв добре насіння,— це Син людський, поле — це світ, добре насіння — сини Царства, бур’яни — сини Злого, а ворог, який їх посіяв,— це Диявол. Жнива — це закінчення віку, а женці — ангели. Тому, подібно як збирають бур’яни і спалюють у вогні, так буде і під час закінчення віку: Син людський пошле своїх ангелів, і ті позбирають у його Царстві всіх, хто є каменем спотикання, і тих, хто чинить беззаконня, та повкидають їх до вогняної печі, де вони будуть плакати і скреготати зубами. А праведні у той час сяятимуть, як сонце, в Царстві свого Батька. Хто має вуха, нехай слухає. Небесне Царство подібне також до скарбу, захованого в полі. Коли чоловік знайшов цей скарб, то сховав його і на радощах пішов, продав усе, що мав, і купив те поле. А ще небесне Царство подібне до мандрівного купця, який шукає гарних перлин. Знайшовши одну дорогоцінну перлину, він пішов та зараз же продав увесь свій маєток і купив її. Також небесне Царство подібне до невода, який закинули в море і яким зібрали усіляку рибу. Коли невід наповнився, рибалки витягли його на берег і, посідавши, зібрали добру рибу в посудини, а непридатну викинули. Саме так буде під час закінчення віку: ангели вийдуть, відділять неправедних від праведних і вкинуть неправедних до вогняної печі, де вони будуть плакати і скреготати зубами. Скажіть, ви зрозуміли суть моїх слів?»." },
{ book: "Матвія", chapter: 13, verse: "52", ref: "Матвія: 13:52", text: "«Так і кожен наставник, навчений про небесне Царство, подібний до господаря дому, котрий дістає зі своєї скарбниці нове і старе»." },
{ book: "Матвія", chapter: 13, verse: "57", ref: "", text: "Матвія: 13:57: «Пророка шанують скрізь, тільки не в рідних краях та не в рідному домі»." },
{ book: "Матвія", chapter: 14, verse: "16", ref: "", text: "Матвія: 14:16: «Не треба їм іти звідси, ви нагодуйте їх»." },
{ book: "Матвія", chapter: 14, verse: "18", ref: "", text: "Матвія: 14:18: «Принесіть їх мені»." },
{ book: "Матвія", chapter: 14, verse: "27", ref: "", text: "Матвія: 14:27: «Не бійтеся, це я. Не лякайтесь»." },
{ book: "Матвія", chapter: 14, verse: "29", ref: "", text: "Матвія: 14:29: «Іди!»." },
{ book: "Матвія", chapter: 14, verse: "31", ref: "", text: "Матвія: 14:31: «Маловіре, чому ти засумнівався?»." },
{ book: "Матвія", chapter: 15, verse: "3-9", ref: "", text: "Матвія: 15:3-9: «А ви чому порушуєте Божу заповідь заради своїх традицій? Наприклад, Бог сказав: “Шануй батька і матір”, а також: “Нехай той, хто зневажливо говорить про свого батька чи матір, буде покараний смертю”. Ви ж говорите: “Хто скаже батькові чи матері: «Все, що я маю і чим міг би допомогти тобі,— це дар, присвячений Богові», той не мусить шанувати батька взагалі”. Так ви заради своєї традиції позбавили сили Боже слово. Лицеміри, Ісая влучно пророкував про вас: “Ці люди шанують мене своїми устами, але їхні серця далеко від мене. Проте даремно вони поклоняються мені, бо видають людські заповіді за Божі вчення”»." },
{ book: "Матвія", chapter: 15, verse: "10-11", ref: "", text: "Матвія: 15:10-11: «Послухайте і зрозумійте: те, що входить в уста, не опоганює людину, її опоганює те, що виходить з уст»." },
{ book: "Матвія", chapter: 15, verse: "13-14", ref: "", text: "Матвія: 15:13-14: «Кожна рослина, яку посадив не мій небесний Батько, буде вирвана з коренем. Полиште їх. Це сліпі провідники. А якщо сліпий веде сліпого, то обидва впадуть в яму»." },
{ book: "Матвія", chapter: 15, verse: "24", ref: "", text: "Матвія: 15:24: «Я був посланий не до всіх, а тільки до загублених овець з народу Ізра́їля»." },
{ book: "Матвія", chapter: 15, verse: "26", ref: "", text: "Матвія: 15:26: «Недобре забрати хліб у дітей і кинути цуценятам»." },
{ book: "Матвія", chapter: 15, verse: "28", ref: "", text: "Матвія: 15:28: «О жінко, яка велика твоя віра! Нехай буде так, як ти хочеш»." },
{ book: "Матвія", chapter: 15, verse: "32", ref: "", text: "Матвія: 15:32: «Шкода мені цих людей, бо вони вже три дні зі мною і не мають що їсти. Я не хочу відправити їх голодними, щоб вони не ослабнули в дорозі»." },
{ book: "Матвія", chapter: 15, verse: "34", ref: "", text: "Матвія: 15:34: «Скільки маєте хлібин?»" },
{ book: "Матвія", chapter: 16, verse: "2-4", ref: "", text: "Матвія: 16:2-4: «Коли вечоріє, ви говорите: “Буде ясна погода, бо небо вогняно-червоне”, а вранці кажете: “Сьогодні буде холодно і йтиме дощ, бо небо вогняно-червоне, але похмуре”. Прикмети на небі ви вмієте тлумачити, проте ознаки цього часу витлумачити не можете. Неправедне і перелюбне покоління постійно шукає знакa, але не отримає жодного, крім знаку, даного через пророка Йо́ну»." },
{ book: "Матвія", chapter: 16, verse: "6", ref: "", text: "Матвія: 16:6: «Дивіться, остерігайтеся фарисейської і садукейської закваски»." },
{ book: "Матвія", chapter: 16, verse: "8-11", ref: "", text: "Матвія: 16:8-11: «Маловіри, чому ви говорите між собою про те, що не маєте хліба? Невже ви й досі не розумієте? Не пам’ятаєте, як п’ятьма хлібинами наїлися 5000 і скільки потім кошиків зібрали? Або як сімома хлібинами наїлись 4000 і скільки великих кошиків ви зібрали? Як же не розумієте, що я говорив вам не про хліб? Остерігайтеся фарисейської і садукейської закваски»." },
{ book: "Матвія", chapter: 16, verse: "13", ref: "", text: "Матвія: 16:13: «Що люди говорять про Сина людського? Хто він такий?»." },
{ book: "Матвія", chapter: 16, verse: "15", ref: "", text: "Матвія: 16:15: «А ви, що ви думаєте? Хто я такий?»." },
{ book: "Матвія", chapter: 16, verse: "16", ref: "", text: "Матвія: 16:16: «Щасливий ти, Си́моне, сину Йо́ни, бо не плоть і кров виявили це тобі, а мій небесний Батько. До того ж говорю тобі: ти — Петро, і на цій скелі я збудую свій збір, і брами могили не подолають його. Я дам тобі ключі від небесного Царства, і все, що ти зв’яжеш на землі, уже буде зв’язане на небесах, а що розв’яжеш на землі, уже буде розв’язане на небесах»." },
{ book: "Матвія", chapter: 16, verse: "23", ref: "", text: "Матвія: 16:23: «Відійди від мене, Сатано! Для мене ти камінь спотикання, бо думаєш не про Боже, а про людське»." },
{ book: "Матвія", chapter: 16, verse: "24-28", ref: "", text: "Матвія: 16:24-28: «Якщо хтось хоче йти за мною, нехай зречеться самого себе, візьме свій стовп мук і постійно йде за мною. Бо, хто хоче врятувати своє життя, той його погубить. А хто погубить своє життя заради мене, той врятує його. Справді, яка користь людині, коли вона здобуде цілий світ, але втратить життя? Або що дасть людина взамін за своє життя? Адже Син людський має прийти у славі свого Батька зі своїми ангелами і тоді відплатить кожному за його вчинками. Правду кажу вам: декотрі з тих, хто тут стоїть, не скуштують смерті, аж поки не побачать Сина людського, який приходить у своєму Царстві»." },
{ book: "Матвія", chapter: 17, verse: "6", ref: "", text: "Матвія: 17:6: «Встаньте, не бійтеся»." },
{ book: "Матвія", chapter: 17, verse: "9", ref: "", text: "Матвія: 17:9: «Нікому не розповідайте про це видіння, аж поки Син людський не воскресне з мертвих»." },
{ book: "Матвія", chapter: 17, verse: "11-12", ref: "", text: "Матвія: 17:11-12: «Ілля справді прийде і все відновить. Але кажу вам: Ілля вже прийшов, та його не розпізнали і з ним зробили все, що хотіли. Так і Син людський має постраждати від їхніх рук»." },
{ book: "Матвія", chapter: 17, verse: "16", ref: "", text: "Матвія: 17:16: «О безвірне й зіпсоване покоління! Скільки мені ще бути з вами? Скільки ще терпіти вас? Приведіть його до мене»." },
{ book: "Матвія", chapter: 17, verse: "20", ref: "", text: "Матвія: 17:20: «Тому що вам бракує віри. Правду кажу вам: якщо ви будете мати віру хоча б з гірчичне зернятко, то скажете цій горі: “Пересунься звідси он туди”, і вона пересунеться, і для вас не буде нічого неможливого»." },
{ book: "Матвія", chapter: 17, verse: "23", ref: "", text: "Матвія: 17:23: «Сина людського зрадять і видадуть в руки людей. Його вб’ють, але на третій день він воскресне»." },
{ book: "Матвія", chapter: 17, verse: "25", ref: "", text: "Матвія: 17:25: «Як ти вважаєш, Си́моне, від кого земні царі беруть мито чи подушний податок: від своїх синів чи від чужих людей?»." },
{ book: "Матвія", chapter: 17, verse: "26-27", ref: "", text: "Матвія: 17:26-27: «Отже, сини звільнені від податку. Але щоб не давати підстави для спотикання, піди до моря, закинь рибальський гачок і візьми першу зловлену рибу, а коли відкриєш їй рот, знайдеш срібну монету. Тож візьми її і дай за мене й за себе»." },
{ book: "Матвія", chapter: 18, verse: "3-20", ref: "", text: "Матвія: 18:3-20: «Правду кажу вам: якщо ви не навернетесь і не станете як малі діти, то нізащо не ввійдете в небесне Царство. Тож хто впокориться, як ця мала дитина, той і є найбільший у небесному Царстві. І той, хто приймає таку малу дитину в моє ім’я, приймає і мене. Однак якщо хтось стане каменем спотикання для когось із цих малих, що вірять у мене, то ліпше було б, якби йому на шию повісили жорно, подібне до того, яке обертає осел, і втопили його у відкритому морі. Горе цьому світові, бо він доводить людей до спотикання! Звичайно, підстави для спотикання неминуче з’являться, але горе тій людині, через яку вони з’являться! Тож, якщо твоя рука чи нога доводить тебе до спотикання, відсічи її та викинь. Ліпше отримати життя, будучи калікою, ніж з двома руками й двома ногами бути вкиненим у вічний вогонь. І, якщо око доводить тебе до спотикання, вирви та викинь його. Ліпше тобі отримати життя з одним оком, аніж з двома очима бути вкиненим у вогняну геє́ну. Дивіться, не зневажайте нікого з цих малих, бо, кажу вам, їхні ангели в небі завжди дивляться на обличчя мого небесного Батька. —— Як ви думаєте: коли якийсь чоловік має 100 овець і одна з них заблукає, чи ж не залишить він 99 у горах і не вирушить на пошуки заблуканої? І якщо він знайде її, то, правду кажу вам, він буде тішитися за неї більше, ніж за 99, котрі не заблукали. Так само й мій небесний Батько не бажає, аби загинув хоч один із цих малих. Якщо твій брат учинить гріх, піди і віч-на-віч вияви йому, що він зробив не такa. Коли він послухається, ти здобув свого брата, а коли не послухається, візьми з собою ще одного чи двох, щоб підтвердити кожну справу свідченням двох чи трьох свідків. Якщо він не послухається їх, скажи збору. Якщо ж і збору не послухається, нехай він буде для тебе як людина з іншого народу і як збирач податків. Правду кажу вам: усе, що зв’яжете на землі, вже буде зв’язане на небі, а що розв’яжете на землі, вже буде розв’язане на небі. Правду кажу вам: якщо двоє з вас на землі домовляться просити мого небесного Батька про щось важливе, то він виконає їхнє прохання. Бо, де двоє або троє зібралися в моє ім’я, там і я посеред них»." },
{ book: "Матвія", chapter: 18, verse: "22-35", ref: "", text: "Матвія: 18:22-35: «Говорю тобі, не до 7, а до 77 разів. Тож Царство небесне можна прирівняти до царя, який захотів, щоб раби повіддавали йому борги. І, коли він взявся за цю справу, привели до нього чоловіка, який заборгував йому 10 000 талантів. Оскільки ж раб не мав чим віддати, пан наказав продати його, а також його дружину, дітей і все майно та сплатити борг. Але раб упав на коліна і вклонився йому, кажучи: “Потерпи мені, і я все тобі віддам”. Пройнявшись жалем, пан відпустив раба і скасував його борг. Проте, вийшовши звідти, цей раб знайшов іншого раба, який заборгував йому 100 дена́ріїв. Він схопив того раба і став душити його та казати: “Віддай усе, що ти заборгував”. Тоді раб упав і почав благати його: “Потерпи мені, і я все тобі віддам”. Однак він не захотів чекати, а пішов і кинув його до в’язниці, аж поки той не віддасть боргу. Коли ж інші раби побачили це, то дуже зажурилися і пішли та розповіли про все своєму пану. А пан покликав того раба й сказав: “Лихий рабе, я скасував увесь твій борг, бо ти благав мене. Чи не мав би й ти змилосердитися над своїм товаришем, як я змилосердився над тобою?” І, розгнівавшись, пан віддав його в’язничним вартовим, аж поки той не поверне всього боргу. Так само мій небесний Батько поведеться з вами, якщо кожен з вас не простить свого брата від усього серця»." },
{ book: "Матвія", chapter: 19, verse: "4-6", ref: "", text: "Матвія: 19:4-6: «Хіба ви не читали, що той, хто створив їх, на початку створив їх як чоловіка і жінку? І хіба не читали, що він сказав: “Тому покине чоловік батька і матір та приліпиться до своєї дружини, і вони обоє стануть одним тілом”? Так що їх уже не двоє, вони — одне тіло. Отже, що Бог з’єднав одним ярмом, нехай жодна людина не розділяє»." },
{ book: "Матвія", chapter: 19, verse: "8-9", ref: "", text: "Матвія: 19:8-9: «Серця ваші зачерствілі, тому Мойсей і пішов на поступки та дозволив вам розлучатися з дружинами, але від самого початку так не було. Говорю вам: хто розлучається зі своєю дружиною не через статеву розпусту і одружується з іншою, той чинить перелюб»." },
{ book: "Матвія", chapter: 19, verse: "11-12", ref: "", text: "Матвія: 19:11-12: «На таке можуть погодитись не всі, а тільки ті, хто має дар. Бо є скопці, які були такими від народження, декого зробили скопцями люди, а дехто сам себе робить скопцем заради небесного Царства. І той, хто може на це погодитись, нехай погоджується»." },
{ book: "Матвія", chapter: 19, verse: "14", ref: "", text: "Матвія: 19:14: «Облиште діток і не заважайте їм приходити до мене, бо саме таким належить небесне Царство»." },
{ book: "Матвія", chapter: 19, verse: "17", ref: "", text: "Матвія: 19:17: «Чому питаєш мене про те, що є добрим? Доброю є лише одна особа. Але якщо ти бажаєш отримати життя, то виконуй заповіді»." },
{ book: "Матвія", chapter: 19, verse: "18", ref: "", text: "Матвія: 19:18: «Не вбивай, не чини перелюбу, не кради, не давай неправдивого свідчення, шануй батька і матір, а також люби свого ближнього, як самого себе»." },
{ book: "Матвія", chapter: 19, verse: "21", ref: "", text: "Матвія: 19:21: «Якщо хочеш бути досконалим, піди продай своє майно і роздай гроші бідним. Так ти збереш собі скарб у небі. А тоді приходь та будь моїм учнем»." },
{ book: "Матвія", chapter: 19, verse: "23-24", ref: "", text: "Матвія: 19:23-24: «Правду кажу вам: важко буде багатому ввійти в Царство небесне. І ще хочу сказати: легше верблюдові пролізти крізь вушко голки, ніж багатому ввійти в Боже Царство»." },
{ book: "Матвія", chapter: 19, verse: "26", ref: "", text: "Матвія: 19:26: «Для людей це неможливо, але для Бога можливо все»." },
{ book: "Матвія", chapter: 19, verse: "28", ref: "", text: "Матвія: 19:28: «Правду кажу вам: під час відтворення, коли Син людський сяде на свій величний престол, ви, ті, хто пішов услід за мною, також сядете на 12 престолах і будете судити 12 племен Ізра́їля. І кожен, хто покинув дім, чи братів, чи сестер, чи батька, чи матір, чи дітей, чи зе́млі заради мого імені, отримає в 100 разів більше й успадкує вічне життя. Тож багато перших стануть останніми, а останні — першими»." },
{ book: "Матвія", chapter: 20, verse: "1-16", ref: "", text: "Матвія: 20:1-16:  «Небесне Царство подібне до господаря дому, який вийшов удосвіта, щоб найняти робітників у свій виноградник. Домовившись з робітниками за 1 дена́рій в день, він відправив їх у виноградник. Пізніше він вийшов коло третьої години і побачив інших, які стояли без роботи на ринковій площі. Господар і їм сказав: “Ви теж ідіть у виноградник, а я заплачу вам скільки належить”. Тож вони пішли. І він вийшов ще раз коло шостої години, а пізніше коло дев’ятої і зробив те саме. Зрештою господар вийшов коло 11-ї години і побачив ще інших, які там стояли, та й сказав: “Чому ви тут стоїте цілий день без роботи?” 7 Вони відповіли: “Бо ніхто нас не найняв”. Тоді він сказав: “І ви йдіть у виноградник”. А як звечоріло, власник винограднику наказав своєму управителю: “Поклич робітників та видай їм платню, починаючи від останнього і до першого”. Коли прийшли чоловіки, які працювали з 11-ї години, кожен з них отримав по дена́рію. Тому як прийшли перші, то сподівалися, що отримають більше, проте і їм заплатили по дена́рію. Отримавши платню, вони почали нарікати на господаря дому і казати: “Останні попрацювали лише годину, а ти заплатив їм нарівні з нами. Ми ж цілий день трудилися і зносили нестерпну спеку!” Проте у відповідь одному з них господар сказав: “Чоловіче, я нічим не скривдив тебе. Хіба не за 1 дена́рій ти домовлявся зі мною? Бери своє і йди. А цьому останньому я хочу дати стільки ж, скільки й тобі. Хіба я не маю права робити зі своїм майном усе, що хочу? А може, ти заздриш через те, що я виявив великодушність?” Тож останні стануть першими, а перші — останніми»." },
{ book: "Матвія", chapter: 20, verse: "17-19", ref: "", text: "Матвія: 20:17-19: «Ось ми йдемо до Єрусалима, і Син людський буде відданий у руки старших священиків та книжників. Вони засудять його на смерть і віддадуть людям з інших народів, щоб ті насміхалися з нього, бичували його і стратили на стовпі, але на третій день він воскресне»." },
{ book: "Матвія", chapter: 20, verse: "22", ref: "", text: "Матвія: 20:22: «Ви не знаєте, чого просите. Чи можете пити чашу, яку я питиму?»." },
{ book: "Матвія", chapter: 20, verse: "23", ref: "", text: "Матвія: 20:23: «Ви справді будете пити чашу мою, але хто сидітиме праворуч чи ліворуч від мене, вирішую не я. Ці місця належать тим, для кого їх приготував мій Батько»." },
{ book: "Матвія", chapter: 20, verse: "25-28", ref: "", text: "Матвія: 20:25-28: «Ви знаєте, що правителі народів панують над людьми і видатні особи володарюють над ними. Проте серед вас так не має бути, а, навпаки, хто хоче бути поміж вами великим, той повинен стати вашим слугою, і, хто хоче бути першим серед вас, той повинен стати вашим рабом. Подібно й Син людський прийшов не для того, щоб йому служили, а щоб послужити і віддати своє життя як викуп за багатьох»." },
{ book: "Матвія", chapter: 20, verse: "32", ref: "", text: "Матвія: 20:32: «Що ви хочете, аби я для вас зробив?»." },
{ book: "Матвія", chapter: 21, verse: "1-3", ref: "", text: "Матвія: 21:1-3: «Підіть у село, що перед вами, і там одразу побачите прив’язану ослицю з ослям. Відв’яжіть їх і приведіть до мене. Якщо хтось буде вам щось говорити, то скажіть: “Вони потрібні Господу”. І тоді вам зараз же їх віддадуть»." },
{ book: "Матвія", chapter: 21, verse: "5", ref: "", text: "Матвія: 21:5: «Скажіть дочці Сіону: “Ось їде до тебе твій цар, він лагідний, він сидить на ослі, на осляті, народженому у в’ючної ослиці”»." },
{ book: "Матвія", chapter: 21, verse: "13", ref: "", text: "Матвія: 21:13: «Написано: “Мій дім називатиметься домом молитви”, ви ж робите з нього печеру розбійників»." },
{ book: "Матвія", chapter: 21, verse: "15", ref: "", text: "Матвія: 21:15: «Чую,— відповів Ісус.— А хіба ви ніколи не читали: “Словами з уст дітей і немовлят ти учинив хвалу”?»." },
{ book: "Матвія", chapter: 21, verse: "19", ref: "", text: "Матвія: 21:19: «Нехай на тобі більше ніколи не буде плодів!»." },
{ book: "Матвія", chapter: 21, verse: "21", ref: "", text: "Матвія: 21:21: «Правду кажу вам: якщо матимете віру й не будете сумніватись, то зробите не лише те, що я зробив з фіговим деревом. Навіть якщо ви скажете цій горі: “Піднімись і кинься в море”, то так і станеться. І все, про що попросите в молитві з вірою, отримаєте»." },
{ book: "Матвія", chapter: 21, verse: "24-25", ref: "", text: "Матвія: 21:24-25:«І я вас про щось запитаю. Якщо ви мені відповісте, я теж скажу, якою владою чиню все це. З якого джерела Іван отримав владу хрестити: з неба чи від людей?»." },
{ book: "Матвія", chapter: 21, verse: "27-31", ref: "", text: "Матвія: 21:27-31: «І я вам не скажу, якою владою чиню все це. А що ви скажете на таке? Один чоловік мав двох синів. Підійшовши до першого, він попросив: “Сину, піди попрацюй сьогодні у винограднику”. У відповідь той сказав: “Не піду”, проте згодом пошкодував про це і пішов. Підійшовши до другого, батько попросив те саме. Той відповів: “Добре, пане”, але не пішов. Який з двох синів виконав волю свого батька?»." },
{ book: "Матвія", chapter: 21, verse: "31-40", ref: "", text: "Матвія: 21:31-40:«Правду кажу вам: збирачі податків і повії йдуть у Боже Царство попереду вас. Бо Іван прийшов до вас, вказуючи шлях праведності, але ви не повірили йому, однак збирачі податків і повії повірили. Ви ж, навіть коли побачили це, все одно не покаялися і не повірили йому. Послухайте інший приклад: один землевласник посадив виноградник, обніс його огорожею, видовбав у ньому давильню і поставив вежу. Тоді він здав його виноградарям, а сам вирушив в іншу країну. Коли ж прийшла пора врожаю, він послав рабів до виноградарів, щоб зібрати свої плоди. Проте виноградарі, взявши його рабів, одного побили, іншого вбили, а ще іншого закидали камінням. Тоді він послав інших рабів, яких було більше, ніж перших, але з ними зробили те саме. Наостанку господар послав до них свого сина, кажучи: “До мого сина вони поставляться з повагою”. Побачивши сина, виноградарі почали говорити між собою: “Це спадкоємець. Ходімо вбиймо його і заберімо його спадщину!” Тож вони схопили його, викинули з винограднику і вбили. Отже, коли прийде власник, що він зробить з виноградарями?»." },
{ book: "Матвія", chapter: 21, verse: "42-44", ref: "", text: "Матвія: 21:42-44:«Хіба ви ніколи не читали в Писаннях: “Камінь, який відкинули будівельники, став головним наріжним каменем. Це від Єгови, і воно дивовижне в наших очах”? Ось чому говорю вам: Боже Царство буде забране від вас і дане народу, який приносить плоди Царства. І той, хто впаде на цей камінь, розіб’ється. А на кого цей камінь упаде, того розчавить»." },
{ book: "Матвія", chapter: 22, verse: "1-14", ref: "", text: "Матвія: 22:1-14:«Царство небесне можна прирівняти до царя, який влаштував весільний бенкет для свого сина. Цар послав рабів, щоб вони покликали запрошених на весільний бенкет, але ті не захотіли прийти. Тоді він вислав інших рабів, говорячи: “Скажіть запрошеним: «Я вже приготував обід, зарізав биків та інших відгодованих тварин, тож усе готове. Приходьте на весільний бенкет»”. Але ті байдуже пішли собі: один — на своє поле, інший — до своєї справи, а ті, що залишились, схопили його рабів, почали з них знущатися і зрештою вбили їх. Цар розлютився, послав своє військо й вигубив тих убивць, а їхнє місто спопелив. Потім він сказав рабам: “Весільний бенкет готовий, але запрошені виявились недостойними. Тому підіть на дороги, що виходять з міста, і запросіть на весільний бенкет кожного, кого тільки зустрінете”. І вийшли раби на дороги та зібрали всіх, кого зустріли: і поганих, і добрих. Тож весільний зал заповнився гістьми, які сіли їсти. Коли цар увійшов, щоб оглянути гостей, то побачив чоловіка, який не був одягнений у весільне вбрання. Отож цар сказав йому: “Чоловіче, як ти ввійшов сюди без весільного вбрання?” Але той мовчав. І цар наказав своїм слугам: “Зв’яжіть йому руки і ноги та викиньте в темряву. Там він буде плакати й скреготати зубами”. Бо запрошених багато, але вибраних мало»." },
{ book: "Матвія", chapter: 22, verse: "17-18", ref: "", text: "Матвія: 22:17-18: «Лицеміри, чому ви мене випробовуєте? Покажіть мені монету, якою сплачують податок»." },
{ book: "Матвія", chapter: 22, verse: "20", ref: "", text: "Матвія: 22:20: «Чиє це зображення та ім’я?»." },
{ book: "Матвія", chapter: 22, verse: "21", ref: "", text: "Матвія: 22:21: «Віддавайте кесаревекесарю, а Боже — Богові»." },
{ book: "Матвія", chapter: 22, verse: "29-32", ref: "", text: "Матвія: 22:29-32: «Ви помиляєтесь, бо не знаєте ні Писань, ні того, як діє Божа сила. Адже при воскресінні ні чоловіки, ні жінки не одружуються, тоді вони подібні до ангелів у небі. Якщо ж ідеться про воскресіння мертвих, то хіба ви не читали, що Бог сказав: “Я Бог Авраама, Бог Ісака і Бог Якова”? Він Бог не мертвих, а живих»." },
{ book: "Матвія", chapter: 22, verse: "37-40", ref: "", text: "Матвія: 22:37-40: «“Люби Єгову, Бога свого, всім своїм серцем, всією своєю душею і всім своїм розумом”. Це перша і найбільша заповідь. І друга, подібна до неї: “Люби свого ближнього, як самого себе”. На цих двох заповідях тримається цілий Закон і Пророки»." },
{ book: "Матвія", chapter: 22, verse: "42", ref: "", text: "Матвія: 22:42:«Що ви думаєте про Христа? Чий він син?»." },
{ book: "Матвія", chapter: 22, verse: "43-45", ref: "", text: "Матвія: 22:43-45: «Чому тоді Давид під натхненням називає його Господом, говорячи: “Сказав Єгова моєму Господу: «Сиди праворуч від мене, поки не покладу твоїх ворогів тобі під ноги»”? Якщо Давид називає його Господом, як же тоді він Давидів син?»." },
{ book: "Матвія", chapter: 23, verse: "2-39", ref: "", text: "Матвія: 23:2-39: «Мойсеєве місце зайняли книжники й фарисеї. Тому все, що вони кажуть вам, робіть і дотримуйтесь цього, але не поводьтеся так, як вони, бо вони говорять, та не виконують того, що говорять. Вони в’яжуть важкі тягарі і звалюють їх на плечі людей, а самі не хочуть їх і пальцем ворухнути. Вони все роблять для того, щоб їх бачили люди. Вони розширюють коробочки з уривками Писання, які носять для захисту, і подовжують торочки на своєму вбранні. Вони люблять мати найпочесніші місця на бенкетах і передні місця в синагогах. Вони прагнуть, щоб їх вітали на ринкових площах і зверталися до них: “Учителю”. А ви не називайтеся вчителями, бо одного маєте Вчителя, усі ж ви — брати. І нікого на землі не називайте батьком, бо одного маєте Батька — небесного. Також не називайтеся провідниками, бо одного маєте Провідника — Христа. А найбільший серед вас повинен бути вашим слугою. Той, хто звеличується, буде впокорений, а хто впокорюється, буде звеличений. Горе вам, книжники й фарисеї, лицеміри! Ви зачиняєте Царство небесне перед людьми; ви самі не входите в нього і тих, хто бажає ввійти, не впускаєте.  —— Горе вам, книжники й фарисеї, лицеміри! Ви подорожуєте морем і суходолом, щоб здобути хоча б одного новонаверненого, а коли вам це вдається, робите його таким, що він заслуговує геє́ни вдвічі більше, ніж ви самі. Горе вам, сліпі провідники! Ви говорите: “Якщо хтось клянеться храмом, це нічого, але якщо хтось клянеться золотом храму, то обов’язково має виконати клятву”. Ви безглузді й сліпі! Подумайте, що більше: золото чи храм, який освячує це золото? І ще ви кажете: “Якщо хтось клянеться жертовником, це нічого, але якщо хтось клянеться даром на ньому, то обов’язково має виконати клятву”. Сліпі люди! Подумайте, що більше: дар чи жертовник, який освячує цей дар? Тому кожен, хто клянеться жертовником, клянеться ним і всім, що на ньому. Кожен, хто клянеться храмом, клянеться ним і тим, хто мешкає в ньому. І кожен, хто клянеться небом, клянеться Божим престолом і тим, хто сидить на ньому. Горе вам, книжники й фарисеї, лицеміри! Ви даєте десятину з м’яти, кропу та кмину, однак нехтуєте тим, що важливіше в Законі,— справедливістю, милосердям і вірністю. Усе це треба робити, але й іншим не можна нехтувати. Сліпі провідники, ви відціджуєте комара, але ковтаєте верблюда! Горе вам, книжники й фарисеї, лицеміри! Ви очищаєте келих і миску ззовні, але всередині вони сповнені жадібностіa й прагнення потурати власним бажанням. Сліпий фарисею, очисть спершу келих і миску зсередини, тоді вони стануть чистими і ззовні. Горе вам, книжники й фарисеї, лицеміри! Ви нагадуєте побілені могили, які ззовні здаються дуже гарними, але всередині повні кісток мерців та всілякої нечистоти. Так і ви ззовні здаєтеся праведними, а всередині повні лицемірства і беззаконня. Горе вам, книжники й фарисеї, лицеміри! Ви будуєте могили пророкам і прикрашаєте гробниці праведників, кажучи: “Якби ми жили за днів наших прабатьків, то не брали б з ними участі в пролитті крові пророків”. Цим ви свідчите проти себе і визнаєте, що є синами тих, хто вбивав пророків. Тож довершіть те, що розпочали ваші прабатьки. Змії, роде гадючий, як ви утечете від засудження до геє́ни?! Саме тому я посилаю до вас пророків, мудреців і наставників. Декотрих з них ви погубите і стратите на стовпі, а декотрих будете бичувати у своїх синагогах та переслідувати від міста до міста. Тож на вас спаде вина за кров усіх праведників, що була пролита на землі,— від крові праведного Авеля до крові Заха́рія, Варахı́їного сина, якого ви вбили між святинею і жертовником. Правду кажу вам: все це прийде на це покоління. Єрусалиме, Єрусалиме, ти вбиваєш пророків і каменуєш посланих до тебе! Скільки разів я хотів зібрати твоїх дітей, як квочка збирає курчат під крила свої! Але ви не захотіли. Ось ваш дім покинутий на вас. Кажу вам, віднині ви вже не побачите мене, аж поки не скажете: “Благословенний той, хто йде в ім’я Єгови!”»." },
{ book: "Матвія", chapter: 24, verse: "2", ref: "", text: "Матвія: 24:2: «Бачите все це? Правду кажу вам: не залишиться тут каменя на камені, усе буде зруйновано»." },
{ book: "Матвія", chapter: 24, verse: "4-50, 1-48", ref: "", text: "Матвія: 24:4-50 - 25:1-48: «Стережіться, щоб вас ніхто не ввів в оману, бо багато буде тих, хто прийде під моїм іменем, кажучи: “Я Христос”, і вони багатьох введуть в оману. Ви почуєте про війни у різних місцях. Дивіться, не лякайтеся: усе це має відбуватися, але це ще не кінець. Повстане народ на народ і царство на царство, в одному місці за іншим буде голод і відбуватимуться землетруси. Усе це початок нестерпних мук. Тоді вас віддаватимуть на страждання та вбиватимуть, і за ім’я моє вас будуть ненавидіти всі народи. Того часу багато людей відпадуть від віри та будуть зраджувати й ненавидіти одне одного. З’явиться багато лжепророків, які введуть в оману багатьох; і через ріст беззаконня у більшості людей охолоне любов. Але хто витримає до кінця, той спасеться. І цю добру новину про Царство будуть проповідувати по цілій населеній землі на свідчення всім народам, а тоді прийде кінець. Тож коли побачите, що мерзота, яка спричиняє спустошення і про яку говорив пророк Даниїл, стоїть на святому місці (щоб зрозуміти це, читачеві потрібна розважливість), то нехай ті, що в Юдеї, втікають у гори. Хто буде в той час на даху, хай не спускається, щоб узяти речі з дому. І, хто буде в полі, нехай не повертається за одягом. Горе в ті дні жінкам, які будуть вагітні або годуватимуть грудьми! Моліться, щоб вам не довелося втікати взимку чи в суботу. Бо тоді настане велике лихо, якого не було від початку світу аж дотепер і вже ніколи не буде. І якби не скоротились ті дні, то не врятувалася б жодна людина, але задля обранців ті дні будуть скорочені. Якщо тоді хтось вам скаже: “Дивіться, Христос тут!” або “Дивіться, він там!” — не вірте. Бо з’являться лжехристи і лжепророки, які чинитимуть великі знаки та чуда, щоб, коли можливо, ввести в омануя навіть обранців. Пам’ятайте, я перестеріг вас. Тому, якщо вам скажуть: “Дивіться, він у пустелі!” — не виходьте, або якщо скажуть: “Дивіться, він у внутрішніх кімнатах!” — не вірте. Бо, як блискавка з’являється зі сходу й освічує все аж до заходу, такою буде присутність Сина людського. І, де буде труп, туди злетяться орли. Відразу після лиха, що станеться в ті дні, сонце потемніє і місяць не дасть свого світла, зірки впадуть з неба і сили небесні затрясуться. Потім з’явиться на небі знак Сина людського, і всі племена землі будуть з горя бити себе в груди і побачать Сина людського, який прийде на небесних хмарах із силою та великою славою. Він пошле своїх ангелів з потужним звуком сурми, і вони зберуть його обранців з чотирьох сторін світу — від одного краю неба до іншого. Візьміть для прикладу фігове дерево: як тільки його пагінці набрякають і випускають листя, ви знаєте, що близько літо. Так само, коли ви побачите все це, знайте, що Син людський близько, при дверях. Правду кажу вам: не промине це покоління, як усе це станеться. Небо і земля проминуть, але слова мої нізащо не проминуть. А про день той чи годину не знає ніхто: ні ангели небесні, ні Син, а тільки Батько. Як було за днів Ноя, так буде і під час присутності Сина людського. Подібно як у дні до Потопу люди їли, пили, женилися й виходили заміж аж до дня, коли Ной увійшов у ковчег, і не звертали уваги, поки не прийшов Потоп та не змів їх усіх, так буде і під час присутності Сина людського. Тоді двоє будуть у полі: одного буде забрано, а другого покинуто. Дві жінки будуть молоти на жорнах: одну буде забрано, а другу покинуто. Тож пильнуйте, бо не знаєте, в який день прийде ваш Господь. Проте знайте одне: якби господарю було відомо, під час якої сторожі прийде злодій, він не спав би і не дозволив би влізти у свій дім. Тому й ви будьте готові, адже Син людський прийде о тій годині, про котру не думаєте. Хто ж вірний і розсудливий раб, якого пан призначив над своїми хатніми слугами, щоб своєчасно давати їм поживу? Щасливий той раб, якщо його пан, прийшовши, побачить, що він так і робить! Правду кажу вам: він призначить його над усім своїм маєтком. Але якщо той злий раб скаже у своєму серці: “Пан мій затримується”,— і почне бити інших рабів та їсти й пити із запеклими п’яницями, то пан цього раба прийде в день, коли той не сподівається, і о годині, котрої той не знає, та покарає його з усією суворістю і визначить йому місце серед лицемірів. Там він буде плакати і скреготати зубами. Царство небесне можна прирівняти до 10 дівчат, які взяли свої світильники й вийшли назустріч нареченому. П’ять з них були безглуздими, а п’ять — розсудливими. Безглузді взяли світильники, але не взяли оливи, а розсудливі взяли не лише світильники, але й пляшечки з оливою. Оскільки ж наречений затримувався, вони задрімали і зрештою всі заснули. Раптом посеред ночі пролунав крик: “Дивіться, наречений! Виходьте зустрічати його!” Тоді всі дівчата повставали й підготували свої світильники. І безглузді сказали до розсудливих: “Дайте нам оливи для світильників, бо вони ось-ось загаснуть”. Та розсудливі відповіли: “Тоді може забракнути і вам, і нам. Підіть ліпше до тих, хто її продає, та й купіть собі”. Поки ті ходили купувати, прийшов наречений. Дівчата, які були готові, ввійшли з ним на весільний бенкет, і двері зачинилися. Потім прийшли й інші дівчата, кажучи: “Пане, пане, відчини нам!” Він же відповів: “Говорю вам правду: не знаю я вас”. Отже, пильнуйте, бо не знаєте ні дня, ні години. Також небесне Царство подібне до одного чоловіка, який, вирушаючи в іншу країну, скли́кав рабів і довірив їм своє майно. Одному він дав 5 талантів, іншому — 2, а ще іншому — 1, кожному за його спроможністю, і поїхав в іншу країну. Раб, який отримав 5 талантів, зараз же пішов, пустив їх в обіг і набув ще 5. Так само і той, який отримав 2, набув ще 2. Проте раб, який отримав лише 1, вийшов і сховав гроші свого пана, закопавши їх у землю. Коли минуло багато часу, пан тих рабів, прийшовши, зажадав від них звіту. Отож раб, який отримав 5 талантів, підійшов і приніс ще 5, кажучи: “Пане, ти довірив мені 5 талантів. Поглянь, я набув ще 5”. На це пан сказав: “Молодець, добрий і вірний рабе! Ти був вірний у малому, тому я призначу тебе над чимось більшим. Тішся разом зі своїм паном”. Потім підійшов той, який отримав 2 таланти, і сказав: “Пане, ти довірив мені 2 таланти. Поглянь, я набув ще 2”. Тож пан похвалив і його: “Молодець, добрий і вірний рабе! Ти був вірний у малому, тому я призначу тебе над чимось більшим. Тішся разом зі своїм паном”. Зрештою підійшов раб, який отримав 1 талант, і сказав: “Пане, я знав, що ти дуже вимоглива людина. Ти жнеш там, де не сіяв, і збираєш там, де не віяв. Тому я злякався, пішов та й сховав талант у землю. Ось твої гроші”. На це пан йому відповів: “Лихий і ледачий рабе, ти ж знав, що я жну там, де не сіяв, і збираю там, де не віяв! Тому ти повинен був віддати мої гроші лихварям, а я, прийшовши, отримав би своє з відсотками. Тож заберіть від нього талант і дайте рабові, який має 10 талантів. Бо кожен, хто має, отримає ще більше і матиме вдосталь. А в того, хто не має, заберуть навіть те, що він має. Викиньте цього нікчемного раба в темряву. Там він буде плакати і скреготати зубами”. Коли прийде Син людський у славі і з ним усі ангели, він сяде на свій величний престол. Перед ним зберуться всі народи, і він відділить одних людей від інших, як пастух відділяє овець від козлів. І поставить він овець праворуч від себе, а козлів ліворуч. Потім Цар скаже тим, хто праворуч: “Прийдіть, усі, кого поблагословив мій Батько, успадкуйте Царство, приготоване вам від заснування світу. Бо, коли я був голодний, ви дали мені їсти, коли був спраглий, ви дали мені пити. Я був чужинцем — і ви гостинно прийняли мене, я був нагий — і ви мене одягли. Я захворів — і ви попіклувалися про мене, я був у в’язниці — і ви мене провідали”. На це праведні скажуть йому: “Господи, коли ми бачили тебе голодним і нагодували? Коли бачили тебе спраглим і дали тобі пити? Коли ти був чужинцем і ми гостинно прийняли тебе або коли бачили тебе нагим та одягли? Коли ми бачили тебе хворим чи у в’язниці і провідали тебе?” Цар їм відповість: “Правду кажу вам: усе, що ви зробили одному з найменших моїх братів, зробили й мені”. Потім він скаже тим, хто ліворуч: “Ідіть від мене, про́кляті, у вічний вогонь, приготований Дияволу та його ангелам. Бо я був голодний — і ви не дали мені їсти, я був спраглий — і ви не дали мені пити. Я був чужинцем — і ви не прийняли мене гостинно, я був нагий — і ви не одягли мене, я був хворий та у в’язниці — і ви не попіклувалися про мене”. І вони також скажуть йому у відповідь: “Господи, коли ми бачили тебе голодним, спраглим, чужинцем, нагим, хворим чи у в’язниці й не послужили тобі?” Тоді він їм відповість: “Правду кажу вам: усе, чого ви не зробили одному з цих найменших, не зробили й мені”. Вони будуть назавжди знищені, а праведні отримають вічне життя»." },
{ book: "Матвія", chapter: 26, verse: "1", ref: "", text: "Матвія: 26:1: «Ви знаєте, що через два дні Пасха і Син людський буде відданий у руки ворогів і страчений на стовпі»." },
{ book: "Матвія", chapter: 26, verse: "11-13", ref: "", text: "Матвія: 26:11-13: «Чому ви непокоїте цю жінку? Вона зробила для мене добре діло. Адже бідні завжди з вами, а я з вами буду не завжди. Виливши цю олію на моє тіло, вона підготувала мене до поховання. Правду кажу вам: хоч би де по цілому світі проповідувалася добра новина, розповідатимуть і про вчинок цієї жінки на згадку про неї»." },
{ book: "Матвія", chapter: 26, verse: "18", ref: "", text: "Матвія: 26:18: «Ідіть у місто до такого-то чоловіка і скажіть: “Учитель говорить: «Визначений для мене час близький. Я святкуватиму Пасху з учнями у твоєму домі»”»." },
{ book: "Матвія", chapter: 26, verse: "20", ref: "", text: "Матвія: 26:20: «Правду кажу вам: один з вас зрадить мене»." },
{ book: "Матвія", chapter: 26, verse: "23, 24", ref: "", text: "Матвія: 26:23,24: «Один з тих, хто вмочає зі мною руку в миску, зрадить мене. Це правда, що Син людський іде від вас, як і написано про нього, але горе людині, яка зраджує Сина людського! Ліпше б їй було взагалі не народитися»." },
{ book: "Матвія", chapter: 26, verse: "25", ref: "", text: "Матвія: 26:25: «Ти сам це сказав»." },
{ book: "Матвія", chapter: 26, verse: "26", ref: "", text: "Матвія: 26:26: «Беріть, їжте. Це означає моє тіло»." },
{ book: "Матвія", chapter: 26, verse: "27-29", ref: "", text: "Матвія: «26:27-29: Пийте з неї всі, бо це означає мою “кров угоди”, яка проллється за багатьох для прощення гріхів. Але говорю вам: я більше не буду пити від плоду виноградної лози аж до того дня, коли питиму з вами молоде вино в Царстві мого Батька»." },
{ book: "Матвія", chapter: 26, verse: "31, 32", ref: "", text: "Матвія: 26:31,32: «Усі ви спіткнетесь через те, що станеться зі мною цієї ночі, бо написано: “Я вражу пастиря — і вівці з отари розпорошаться”. Проте коли я воскресну, то піду до Галілеї і там чекатиму на вас»." },
{ book: "Матвія", chapter: 26, verse: "34", ref: "", text: "Матвія: 26:34: «Правду кажу тобі: цієї ночі, перш ніж проспіває півень, ти тричі зречешся мене»." },
{ book: "Матвія", chapter: 26, verse: "36", ref: "", text: "Матвія: 26:36: «Посидьте тут, поки я піду й помолюся»." },
{ book: "Матвія", chapter: 26, verse: "38", ref: "", text: "Матвія: 26:38: «Я дуже засмучений, аж до смерті. Залишайтеся тут і пильнуйте зі мною»." },
{ book: "Матвія", chapter: 26, verse: "39", ref: "", text: "Матвія: 26:39: «Батьку мій, якщо можливо, нехай ця чаша мене омине. Але хай буде не так, як хочу я, а як хочеш ти»." },
{ book: "Матвія", chapter: 26, verse: "40, 41", ref: "", text: "Матвія: 26:40,41: «Невже ви не могли попильнувати зі мною й годину? Пильнуйте й безупинно моліться, щоб не впасти в спокусу. Звичайно, дух бадьорий, але плоть слабка»." },
{ book: "Матвія", chapter: 26, verse: "42", ref: "", text: "Матвія: 26:42: «Батьку мій, якщо неможливо, щоб ця чаша мене оминула, і я таки маю випити її, то нехай буде твоя воля»." },
{ book: "Матвія", chapter: 26, verse: "45", ref: "", text: "Матвія: 26:45: «У такий час ви спите й відпочиваєте?! Ось надходить година, коли Син людський буде зраджений і відданий у руки грішників. Вставайте, ходімо. Мій зрадник уже близько»." },
{ book: "Матвія", chapter: 26, verse: "50", ref: "", text: "Матвія: 26:50: «Чоловіче, навіщо ти прийшов?»" },
{ book: "Матвія", chapter: 26, verse: "52-54", ref: "", text: "Матвія: 26:52-54: «Вклади меча назад у його місце, бо кожен, хто візьметься за меча, від меча й загине. Невже ти думаєш, що я не міг би попросити свого Батька дати мені в цю ж мить більше ніж 12 легіонів ангелів? Тільки як тоді виконалися б слова з Писання про те, що саме так має статися?»" },
{ book: "Матвія", chapter: 26, verse: "55, 56", ref: "", text: "Матвія: 26:55,56: «Хіба я розбійник, що ви прийшли арештувати мене з мечами й палицями? Я день у день сидів з вами, навчаючи в храмі, та ви не брали мене під варту. Однак усе це відбувається, щоб сповнилися писання пророків»." },
{ book: "Матвія", chapter: 26, verse: "64", ref: "", text: "Матвія: 26:64: «Ти сам це сказав. Однак говорю вам: віднині ви будете бачити Сина людського, який сидітиме праворуч від Сильного і йтиме на небесних хмарах»." },
{ book: "Матвія", chapter: 27, verse: "11", ref: "", text: "Матвія: 27:11:«Ти сам це кажеш»." },
{ book: "Матвія", chapter: 27, verse: "46", ref: "", text: "Матвія: 27:46: «Елı́, Елı́, лама́ сабахтанı́?» — тобто: «Боже мій, Боже мій, чому ти мене покинув?»" },
{ book: "Матвія", chapter: 28, verse: "9", ref: "", text: "Матвія: 28:9: «Вітаю вас!»" },
{ book: "Матвія", chapter: 28, verse: "10", ref: "", text: "Матвія: 28:10: «Не бійтеся! Підіть скажіть моїм братам, щоб вони йшли до Галілеї. Там вони побачать мене»." },
{ book: "Матвія", chapter: 28, verse: "18-20", ref: "", text: "Матвія: 28:18-20: «Дана мені вся влада на небі і на землі. Тож ідіть та робіть учнями людей з усіх народів, хрестячи їх в ім’я Батька, і Сина, і святого духу, навчаючи їх дотримуватися всього того, що я вам наказав. І я буду з вами всі дні аж до закінчення цього віку»." },
{ book: "Марка", chapter: 1, verse: "15", ref: "Марка: 1:15", text: "«Визначений час прийшов, і Боже Царство наблизилося. Покайтесь і вірте в добру новину»." },
{ book: "Марка", chapter: 1, verse: "17", ref: "Марка: 1:17", text: "«Ходіть за мною, і я зроблю вас ловцями людей»." },
{ book: "Марка", chapter: 1, verse: "15", ref: "Марка: 1:25", text: "«Замовкни і вийди з нього!»." },
{ book: "Марка", chapter: 1, verse: "38", ref: "Марка: 1:38", text: "«Ходімо далі, до поблизьких міст, аби я міг і там проповідувати, бо для цього я прийшов»." },
{ book: "Марка", chapter: 1, verse: "41", ref: "Марка: 1:41", text: "«Хочу! Будь чистим»." },
{ book: "Марка", chapter: 1, verse: "44", ref: "Марка: 1:44", text: "«Дивись, нікому нічого не говори, а піди покажись священику і принеси за своє очищення те, що наказував Мойсей, — їм на свідчення»." },
{ book: "Марка", chapter: 2, verse: "5", ref: "Марка: 2:5", text: "«Дитино, твої гріхи прощено»." },
{ book: "Марка", chapter: 2, verse: "8-10", ref: "Марка: 2:8-10", text: "«Чому ви розмірковуєте так у своїх серцях? 9 Що́ простіше сказати паралізованому: “Твої гріхи прощено” чи “Встань, візьми свої ноші і йди”? Але я хочу, щоб ви знали: Син людський має владу прощати на землі гріхи»." },
{ book: "Марка", chapter: 2, verse: "11", ref: "Марка: 2:11", text: "«Кажу тобі, встань, візьми свої ноші і йди додому»." },

{ book: "Марка", chapter: 2, verse: "14", ref: "Марка: 2:14", text: "«Будь моїм учнем і йди за мною»." },
{ book: "Марка", chapter: 2, verse: "17", ref: "Марка: 2:17", text: "«Будь моїм учнем і йди за мною»." },
{ book: "Марка", chapter: 2, verse: "19-22", ref: "Марка: 2:19-22", text: "«Хіба потрібно друзям нареченого постити, коли він ще з ними? Поки наречений з ними, вони не мають причини постити. Однак настануть дні, коли нареченого від них заберуть. Того дня вони й будуть постити." + 
"Ніхто не пришиває до старого одягу латки з нової тканини, інакше латка збіжиться і діра стане ще більшою. Так само ніхто не наливає молодого вина в старі бурдюки, інакше вино їх прорве; тоді пропаде і вино, і бурдюки. Молоде вино наливають у нові бурдюки»." },
{ book: "Марка", chapter: 2, verse: "25, 26", ref: "Марка: 2:25,26", text: "«А ви хіба не читали, що́ зробив Давид, коли закінчилися харчі, і він та його люди зголодніли? "
+ "Не читали, як, згідно з розповіддю про старшого священика Евіата́ра, він увійшов у Божий дім, сам їв хліби представлення і дав людям, які були з ним? Але це не дозволяється нікому, крім священиків»." },
{ book: "Марка", chapter: 2, verse: "27,28", ref: "Марка: 2:27,28", text: "«Субота з’явилася заради людини, а не людина заради суботи. Тому Син людський має владу над суботою»." },

{ book: "Марка", chapter: 3, verse: "3, 4", ref: "Марка: 3:3, 4", text: "«Встань і вийди на середину,— а тоді звернувся до них: — Що́ дозволено робити в суботу: добро чи зло, врятувати життя чи вбити?»." },
{ book: "Марка", chapter: 3, verse: "5", ref: "Марка: 3:5", text: "«Простягни руку»." },
{ book: "Марка", chapter: 3, verse: "24-29", ref: "Марка: 3:24-29", text: "«Як Сатана може виганяти Сатану? " 
+ "Коли в царстві виникає поділення, воно вже не може встояти. 25 І, якщо в домі виникає поділення, він також не встоїть. "
